<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CrazyFood</title>
<style>
/* ── Reset ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }

/* ── Palette: black / white / gray only ── */
:root {
  --bg:         #080808;
  --surface:    #111111;
  --card:       #181818;
  --border:     #242424;
  --border-hi:  #3a3a3a;
  --gray:       #555;
  --gray-mid:   #888;
  --gray-light: #aaa;
  --off-white:  #ccc;
  --white:      #ececec;
}

body {
  background: var(--bg);
  color: var(--white);
  font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  font-size: 14px;
}

/* ── Header ── */
header {
  position: fixed; top: 0; left: 0; right: 0; height: 44px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; padding: 0 2rem;
  z-index: 100; gap: 1.2rem;
}
header h1 {
  font-size: 13px; font-weight: 700;
  letter-spacing: .18em; text-transform: uppercase; color: var(--white);
}
header span {
  font-size: 11px; color: var(--gray); letter-spacing: .06em;
}

/* ── Two-column layout ── */
.app {
  display: grid;
  grid-template-columns: 1fr 400px;
  height: 100vh;
  padding-top: 44px;
}

/* ── LEFT: character panel ── */
.char-panel {
  position: relative;
  background: var(--bg);
  display: flex; align-items: center; justify-content: center;
  overflow: hidden;
}

#char-canvas { display: none; max-width: 100%; max-height: calc(100vh - 44px); }

/* placeholder */
.placeholder {
  display: flex; flex-direction: column; align-items: center; gap: 1.2rem;
}
.placeholder-box {
  width: 220px; height: 260px;
  border: 1px dashed var(--border-hi);
  border-radius: 14px;
  display: flex; align-items: center; justify-content: center;
  color: var(--gray); font-size: 11px; letter-spacing: .1em; text-transform: uppercase;
  text-align: center; line-height: 1.8;
}
.placeholder p {
  font-size: 11px; color: var(--gray); letter-spacing: .05em;
}

/* speech bubble — overlaid on char panel, top-center */
#bubble-wrap {
  position: absolute; top: 1.2rem; left: 50%;
  transform: translateX(-50%);
  max-width: 72%; min-width: 200px;
  z-index: 20; pointer-events: none;
  display: none;
  animation: bubbleFadeIn .25s ease;
}
@keyframes bubbleFadeIn { from { opacity:0; transform: translateX(-50%) translateY(-4px); } to { opacity:1; transform: translateX(-50%) translateY(0); } }

#bubble {
  background: var(--white);
  color: #111;
  border-radius: 12px;
  padding: .85rem 1.1rem;
  font-size: 12.5px; line-height: 1.6;
  position: relative;
  box-shadow: 0 6px 28px rgba(0,0,0,.7);
}
#bubble strong { font-weight: 700; }

#bubble::after {
  content: '';
  position: absolute;
  top: 100%; left: 50%; transform: translateX(-50%);
  border: 9px solid transparent;
  border-top-color: var(--white);
  border-bottom: 0;
}

.bubble-tag {
  display: block;
  font-size: 10px; font-weight: 700;
  text-transform: uppercase; letter-spacing: .1em;
  color: var(--gray);
  margin-bottom: .35rem;
}

/* ── RIGHT panel ── */
.right {
  background: var(--surface);
  border-left: 1px solid var(--border);
  display: flex; flex-direction: column;
  overflow: hidden;
}

/* api key */
.api-row {
  padding: 1rem 1.4rem;
  border-bottom: 1px solid var(--border);
}
.field-label {
  font-size: 10px; font-weight: 700;
  text-transform: uppercase; letter-spacing: .1em;
  color: var(--gray); margin-bottom: .4rem;
}
.row { display: flex; gap: .5rem; }
input[type=password] {
  flex: 1; background: var(--card);
  border: 1px solid var(--border); border-radius: 6px;
  padding: .45rem .75rem; color: var(--white); font-size: 12px; outline: none;
  transition: border-color .15s;
}
input[type=password]:focus { border-color: var(--gray-mid); }

/* buttons */
button {
  background: var(--white); color: #111;
  font-weight: 700; font-size: 11px; letter-spacing: .06em;
  border: none; border-radius: 6px;
  padding: .45rem 1rem; cursor: pointer; white-space: nowrap;
  transition: opacity .15s;
}
button:hover { opacity: .8; }
button:disabled { opacity: .3; cursor: not-allowed; }
button.ghost {
  background: transparent; color: var(--gray);
  border: 1px solid var(--border); font-weight: 400;
}
button.ghost:hover { border-color: var(--border-hi); color: var(--off-white); }

/* upload */
.upload-row {
  padding: 1rem 1.4rem;
  border-bottom: 1px solid var(--border);
}
#upload-zone {
  border: 1px dashed var(--border-hi); border-radius: 10px;
  padding: 1.6rem 1rem; text-align: center; cursor: pointer;
  transition: border-color .2s, background .2s;
  position: relative;
}
#upload-zone:hover, #upload-zone.over {
  border-color: var(--gray-mid); background: rgba(255,255,255,.02);
}
#upload-zone strong { font-size: 12px; color: var(--off-white); }
#upload-zone p { font-size: 11px; color: var(--gray); margin-top: .25rem; }
#upload-zone input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
.upload-icon {
  width: 32px; height: 32px;
  border: 1px solid var(--border-hi); border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto .6rem;
  color: var(--gray-mid); font-size: 16px; font-weight: 300;
}

/* food name bar */
#food-name {
  display: none; padding: .6rem 1.4rem;
  font-size: 10px; font-weight: 700; letter-spacing: .14em;
  text-transform: uppercase; color: var(--gray-light);
  border-bottom: 1px solid var(--border);
}

/* progress */
#progress {
  display: none; padding: .8rem 1.4rem;
  border-bottom: 1px solid var(--border);
}
.step {
  display: flex; align-items: center; gap: .6rem;
  padding: .22rem 0; font-size: 11px; color: var(--gray);
  transition: color .3s;
}
.step.active { color: var(--off-white); }
.step.done   { color: var(--gray-mid); }
.dot {
  width: 5px; height: 5px; border-radius: 50%;
  background: var(--border-hi); flex-shrink: 0; transition: background .3s;
}
.step.active .dot { background: var(--white); animation: blink .7s infinite; }
.step.done   .dot { background: var(--gray-mid); animation: none; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.25} }

/* error */
#error { display: none; padding: .5rem 1.4rem; font-size: 11px; color: var(--gray-light); }

/* nutrients */
#nutrients {
  display: none; flex: 1; overflow-y: auto; padding: 1rem 1.4rem;
}
#nutrients::-webkit-scrollbar { width: 3px; }
#nutrients::-webkit-scrollbar-track { background: transparent; }
#nutrients::-webkit-scrollbar-thumb { background: var(--border-hi); border-radius: 2px; }
.sec-label {
  font-size: 10px; font-weight: 700; letter-spacing: .12em;
  text-transform: uppercase; color: var(--gray); margin-bottom: .7rem;
}
.n-card {
  border: 1px solid var(--border); border-radius: 8px;
  padding: .65rem .9rem; margin-bottom: .5rem;
  background: var(--card);
  display: grid; grid-template-columns: 1fr auto;
  row-gap: .2rem;
  opacity: 0; transform: translateX(8px);
  transition: opacity .4s, transform .4s, border-color .25s, background .25s;
}
.n-card.show { opacity: 1; transform: translateX(0); }
.n-card.active {
  border-color: var(--border-hi); background: rgba(255,255,255,.04);
}
.n-name {
  font-size: 10px; font-weight: 700; letter-spacing: .08em;
  text-transform: uppercase; color: var(--off-white); grid-column: 1;
}
.n-amount {
  font-size: 10px; color: var(--gray-light); grid-column: 2;
  font-variant-numeric: tabular-nums;
}
.n-desc {
  font-size: 11px; color: var(--gray); line-height: 1.5;
  grid-column: 1 / -1; margin-top: .1rem;
}

/* personality */
#personality {
  display: none; padding: .7rem 1.4rem;
  font-size: 11px; color: var(--gray); font-style: italic; line-height: 1.5;
  border-top: 1px solid var(--border);
}

/* reset */
#reset-btn { display: none; margin: .8rem 1.4rem; }

/* reduced motion */
@media (prefers-reduced-motion: reduce) {
  .n-card { transition: none; }
  .dot { animation: none !important; }
}
</style>
</head>
<body>

<header>
  <h1>CrazyFood</h1>
  <span>food portrait generator</span>
</header>

<div class="app">

  <!-- LEFT: Character canvas -->
  <div class="char-panel">
    <div class="placeholder" id="placeholder">
      <div class="placeholder-box">character<br>appears here</div>
      <p>upload a food photo to begin</p>
    </div>
    <canvas id="char-canvas"></canvas>
    <!-- Speech bubble -->
    <div id="bubble-wrap"><div id="bubble"></div></div>
  </div>

  <!-- RIGHT: Controls -->
  <div class="right">

    <div class="api-row">
      <div class="field-label">Anthropic API Key</div>
      <div class="row">
        <input type="password" id="api-key" placeholder="sk-ant-..." />
        <button onclick="saveKey()">Save</button>
      </div>
    </div>

    <div class="upload-row">
      <div id="upload-zone">
        <div class="upload-icon">+</div>
        <strong>Drop food photo here</strong>
        <p>or click to browse — JPG, PNG, WEBP</p>
        <input type="file" id="file-input" accept="image/*" />
      </div>
    </div>

    <div id="error"></div>

    <div id="food-name"></div>

    <div id="progress">
      <div class="step" id="s1"><div class="dot"></div>Identifying food...</div>
      <div class="step" id="s2"><div class="dot"></div>Rendering character...</div>
      <div class="step" id="s3"><div class="dot"></div>Building personality...</div>
      <div class="step" id="s4"><div class="dot"></div>Preparing speech...</div>
    </div>

    <div id="nutrients">
      <div class="sec-label">Nutritional Composition</div>
      <div id="n-cards"></div>
    </div>

    <div id="personality"></div>

    <button class="ghost" id="reset-btn" onclick="resetAll()">Start over</button>

  </div>
</div>

<script>
// ── State ──────────────────────────────────────────────────────────────────
let API_KEY = localStorage.getItem('cf_key') || '';
let rafId = null;
let speechTimer = null;
let speechList = [];
let speechIdx = 0;
let baseCanvas = null;   // offscreen pointillism canvas
let mouthOpen = false;
let talking = false;

document.getElementById('api-key').value = API_KEY;

// ── Upload wiring ──────────────────────────────────────────────────────────
const zone = document.getElementById('upload-zone');
zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('over'); });
zone.addEventListener('dragleave', () => zone.classList.remove('over'));
zone.addEventListener('drop', e => {
  e.preventDefault(); zone.classList.remove('over');
  const f = e.dataTransfer.files[0];
  if (f?.type.startsWith('image/')) handleFile(f);
  else showErr('Please drop an image file.');
});
document.getElementById('file-input').addEventListener('change', e => {
  if (e.target.files[0]) handleFile(e.target.files[0]);
});

function saveKey() {
  API_KEY = document.getElementById('api-key').value.trim();
  localStorage.setItem('cf_key', API_KEY);
}

// ── Pipeline ───────────────────────────────────────────────────────────────
async function handleFile(file) {
  if (!API_KEY) { showErr('Enter your Anthropic API key first.'); return; }
  clearErr();

  const dataUrl = await fileToDataUrl(file);
  const b64 = dataUrl.split(',')[1];

  showProgress(true);
  hideResults();

  try {
    setStep(1, 'active');
    const data = await analyzeFood(b64, file.type);
    setStep(1, 'done');

    setStep(2, 'active');
    const img = await loadImg(dataUrl);
    baseCanvas = buildPointillism(img);
    startAnim(data);
    setStep(2, 'done');

    setStep(3, 'active');
    buildCards(data);
    setStep(3, 'done');

    setStep(4, 'active');
    speechList = data.speeches || [];
    speechIdx = 0;
    startSpeech();
    setStep(4, 'done');

    showProgress(false);
    showResults(data);
  } catch (err) {
    showProgress(false);
    showErr('Error: ' + err.message);
    console.error(err);
  }
}

function fileToDataUrl(file) {
  return new Promise(res => {
    const r = new FileReader();
    r.onload = () => res(r.result);
    r.readAsDataURL(file);
  });
}

function loadImg(src) {
  return new Promise((res, rej) => {
    const i = new Image();
    i.onload = () => res(i);
    i.onerror = rej;
    i.src = src;
  });
}

// ── Claude API ─────────────────────────────────────────────────────────────
async function claude(system, content) {
  const r = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'x-api-key': API_KEY,
      'anthropic-version': '2023-06-01',
      'content-type': 'application/json',
      'anthropic-dangerous-direct-browser-access': 'true'
    },
    body: JSON.stringify({
      model: 'claude-opus-4-5',
      max_tokens: 1600,
      system,
      messages: [{ role: 'user', content }]
    })
  });
  if (!r.ok) throw new Error(`API ${r.status}: ${await r.text()}`);
  return (await r.json()).content[0].text;
}

async function analyzeFood(b64, mime) {
  const sys = `You are a food recognition and nutrition expert.
Respond ONLY with valid JSON (no markdown fences) matching this schema exactly:
{
  "name": "common food name",
  "sharpness": 0-10,
  "dominantMacro": "sugar|fat|protein|fiber",
  "colorProfile": "warm|cool|neutral",
  "personality": "2-sentence character personality based on dominant macro and shape",
  "faceX": 0.0-1.0,
  "faceY": 0.0-1.0,
  "nutrients": {
    "sugar": number, "fat": number, "protein": number, "carbs": number,
    "fiber": number, "potassium": number, "magnesium": number,
    "calcium": number, "vitaminC": number
  },
  "speeches": [
    {
      "nutrient": "Nutrient Name",
      "amount": "Xg",
      "text": "First-person 1-2 sentences. Wrap nutrient name and amount in **bold**. Translate numbers into feelings or superpowers. Match the personality."
    }
  ]
}
faceX/faceY: normalized 0-1 position of the center of the food's top/face area in the image.
speeches: 5-7 items, one per key nutrient. Use casual personality-appropriate language.
Use standard per-serving nutritional values.`;

  const raw = await claude(sys, [
    { type: 'image', source: { type: 'base64', media_type: mime, data: b64 } },
    { type: 'text', text: 'Analyze this food image.' }
  ]);
  return JSON.parse(raw.replace(/```json\n?/g, '').replace(/```\n?/g, '').trim());
}

// ── Module 1+2: Pointillism character from photo ───────────────────────────
function buildPointillism(img) {
  // Fit into 500 x 560 max, preserve aspect
  const maxW = 500, maxH = 560;
  const ar = img.naturalWidth / img.naturalHeight;
  let W, H;
  if (ar > maxW / maxH) { W = maxW; H = Math.round(maxW / ar); }
  else                  { H = maxH; W = Math.round(maxH * ar); }

  const off = document.createElement('canvas');
  off.width = W; off.height = H;
  const ctx = off.getContext('2d', { willReadFrequently: true });

  ctx.drawImage(img, 0, 0, W, H);
  const px = ctx.getImageData(0, 0, W, H);
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#080808';
  ctx.fillRect(0, 0, W, H);

  // Circle size tuned to image resolution
  const step = Math.max(5, Math.floor(Math.min(W, H) / 72));

  for (let y = step * 0.5; y < H; y += step) {
    for (let x = step * 0.5; x < W; x += step) {
      const i = (Math.floor(y) * W + Math.floor(x)) * 4;
      if (px.data[i + 3] < 40) continue;          // transparent
      const r = px.data[i], g = px.data[i+1], b = px.data[i+2];
      const gray = 0.299*r + 0.587*g + 0.114*b;
      if (gray < 12) continue;                      // pure black → skip

      const t = gray / 255;
      const radius = step * (0.28 + t * 0.34);     // brighter = bigger circle

      ctx.beginPath();
      ctx.arc(x, y, radius, 0, Math.PI * 2);
      ctx.fillStyle = `rgb(${gray|0},${gray|0},${gray|0})`;
      ctx.fill();
    }
  }
  return off;
}

// ── Module 3: Animated face overlay ───────────────────────────────────────
function startAnim(data) {
  const canvas = document.getElementById('char-canvas');
  const W = baseCanvas.width, H = baseCanvas.height;
  canvas.width = W; canvas.height = H;
  canvas.style.display = 'block';
  document.getElementById('placeholder').style.display = 'none';

  const ctx = canvas.getContext('2d');
  // Face position from Claude's estimate
  const fx = (data.faceX ?? 0.5) * W;
  const fy = (data.faceY ?? 0.3) * H;

  if (rafId) cancelAnimationFrame(rafId);

  function tick() {
    ctx.clearRect(0, 0, W, H);
    ctx.fillStyle = '#080808';
    ctx.fillRect(0, 0, W, H);

    const bob = Math.sin(Date.now() / 310) * 5;
    ctx.drawImage(baseCanvas, 0, bob);
    drawFace(ctx, fx, fy + bob, W, data);

    rafId = requestAnimationFrame(tick);
  }
  tick();
}

function drawFace(ctx, cx, cy, W, data) {
  const sharp = data.sharpness ?? 3;
  const macro = data.dominantMacro ?? 'protein';
  const s = W / 500;  // scale factor

  const sep  = 24 * s;
  const erx  = (sharp > 6 ? 11 : 9) * s;
  const ery  = (macro === 'sugar' ? 14 : macro === 'protein' ? 8 : 10) * s;
  const brow = cy - ery - 8 * s;
  const bl   = erx * 1.25;
  const mouthY = cy + ery * 2.2;
  const mw   = 18 * s;

  ctx.save();

  // ── eyes ──
  [cx - sep, cx + sep].forEach(ex => {
    // sclera
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.ellipse(ex, cy, erx, ery, 0, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = '#111'; ctx.lineWidth = 1.5 * s;
    ctx.beginPath(); ctx.ellipse(ex, cy, erx, ery, 0, 0, Math.PI*2); ctx.stroke();
    // pupil
    const pr = erx * 0.44;
    ctx.fillStyle = '#111';
    ctx.beginPath(); ctx.arc(ex + s, cy, pr, 0, Math.PI*2); ctx.fill();
    // catchlight
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(ex + 1.8*s, cy - pr*0.4, pr*0.28, 0, Math.PI*2); ctx.fill();
  });

  // ── eyebrows ──
  ctx.strokeStyle = '#111'; ctx.lineWidth = 2.5*s; ctx.lineCap = 'round';
  if (sharp > 5) {
    // angled — aggressive
    ctx.beginPath(); ctx.moveTo(cx - sep - bl, brow + 4*s); ctx.lineTo(cx - sep + bl, brow - 2*s); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx + sep - bl, brow - 2*s); ctx.lineTo(cx + sep + bl, brow + 4*s); ctx.stroke();
  } else {
    // flat — calm
    ctx.beginPath(); ctx.moveTo(cx - sep - bl, brow); ctx.lineTo(cx - sep + bl, brow); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx + sep - bl, brow); ctx.lineTo(cx + sep + bl, brow); ctx.stroke();
  }

  // ── mouth ──
  ctx.strokeStyle = '#111'; ctx.lineWidth = 2.5*s; ctx.lineCap = 'round';
  if (talking && mouthOpen) {
    ctx.fillStyle = '#111';
    ctx.beginPath();
    ctx.ellipse(cx, mouthY + 4*s, mw*0.65, 6.5*s, 0, 0, Math.PI);
    ctx.fill(); ctx.stroke();
  } else {
    const curve = macro === 'sugar' ? -9 : macro === 'fat' ? 5 : 3;
    ctx.beginPath();
    ctx.moveTo(cx - mw, mouthY);
    ctx.quadraticCurveTo(cx, mouthY + curve*s, cx + mw, mouthY);
    ctx.stroke();
  }

  ctx.restore();
}

// ── Module 4: Per-nutrient speech bubbles ─────────────────────────────────
function startSpeech() {
  if (!speechList.length) return;
  nextSpeech();
}

function nextSpeech() {
  const item = speechList[speechIdx];
  showBubble(item);
  highlightCard(item.nutrient);
  speakItem(item.text.replace(/\*\*([^*]+)\*\*/g, '$1'));

  speechTimer = setTimeout(() => {
    speechIdx = (speechIdx + 1) % speechList.length;
    nextSpeech();
  }, 5500);
}

function showBubble(item) {
  const wrap = document.getElementById('bubble-wrap');
  const bel  = document.getElementById('bubble');
  wrap.style.display = 'block';

  // Re-trigger animation
  wrap.style.animation = 'none';
  void wrap.offsetWidth;
  wrap.style.animation = '';

  bel.innerHTML = '';

  const tag = document.createElement('span');
  tag.className = 'bubble-tag';
  tag.textContent = item.nutrient + (item.amount ? ' — ' + item.amount : '');
  bel.appendChild(tag);

  const body = document.createElement('span');
  bel.appendChild(body);

  // Typewriter with bold parsing
  const tokens = parseBold(item.text || '');
  let ti = 0, ci = 0;

  function type() {
    if (ti >= tokens.length) return;
    const tok = tokens[ti];
    if (ci < tok.text.length) {
      if (tok.bold) {
        let strong = body.lastChild;
        if (!strong || strong.nodeName !== 'STRONG') {
          strong = document.createElement('strong');
          body.appendChild(strong);
        }
        strong.textContent += tok.text[ci];
      } else {
        let tn = body.lastChild;
        if (!tn || tn.nodeType !== 3) { tn = document.createTextNode(''); body.appendChild(tn); }
        tn.textContent += tok.text[ci];
      }
      ci++;
      setTimeout(type, 28);
    } else { ti++; ci = 0; setTimeout(type, 28); }
  }
  type();
}

function parseBold(text) {
  const out = [], re = /\*\*([^*]+)\*\*/g;
  let last = 0, m;
  while ((m = re.exec(text)) !== null) {
    if (m.index > last) out.push({ text: text.slice(last, m.index), bold: false });
    out.push({ text: m[1], bold: true });
    last = m.index + m[0].length;
  }
  if (last < text.length) out.push({ text: text.slice(last), bold: false });
  return out;
}

function highlightCard(name) {
  const key = name.toLowerCase().replace(/[^a-z]/g, '');
  document.querySelectorAll('.n-card').forEach(c => {
    const cn = (c.dataset.key || '').replace(/[^a-z]/g, '');
    c.classList.toggle('active', cn === key);
  });
}

function speakItem(text) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.rate = 0.95;
  talking = true;
  let mi = setInterval(() => { mouthOpen = !mouthOpen; }, 115);
  u.onend = () => { clearInterval(mi); mouthOpen = false; talking = false; };
  window.speechSynthesis.speak(u);
}

// ── Nutrient cards ─────────────────────────────────────────────────────────
const NUTRI = {
  sugar:     { label: 'Sugar',     unit: 'g',  desc: 'Quick energy source — powers your brain and muscles instantly.' },
  fat:       { label: 'Fat',       unit: 'g',  desc: 'Stores energy, insulates organs, and carries fat-soluble vitamins.' },
  protein:   { label: 'Protein',   unit: 'g',  desc: 'Builds and repairs muscle tissue, enzymes, and immune cells.' },
  carbs:     { label: 'Carbs',     unit: 'g',  desc: 'Primary fuel for the body — feeds the brain and muscles.' },
  fiber:     { label: 'Fiber',     unit: 'g',  desc: 'Feeds gut bacteria and keeps digestion running smoothly.' },
  potassium: { label: 'Potassium', unit: 'mg', desc: 'Regulates blood pressure and keeps the heart beating steadily.' },
  magnesium: { label: 'Magnesium', unit: 'mg', desc: 'Involved in 300+ enzyme reactions — muscles, bones, energy.' },
  calcium:   { label: 'Calcium',   unit: 'mg', desc: 'Builds and maintains bones and teeth; aids muscle contraction.' },
  vitaminC:  { label: 'Vitamin C', unit: 'mg', desc: 'Boosts immunity and collagen synthesis; fights oxidative stress.' },
};

function buildCards(data) {
  const wrap = document.getElementById('n-cards');
  wrap.innerHTML = '';
  const n = data.nutrients || {};
  let i = 0;
  Object.entries(NUTRI).forEach(([key, info]) => {
    const val = n[key];
    if (!val || val <= 0) return;
    const d = document.createElement('div');
    d.className = 'n-card';
    d.dataset.key = info.label.toLowerCase();
    d.innerHTML = `<span class="n-name">${info.label}</span><span class="n-amount">${val}${info.unit}</span><span class="n-desc">${info.desc}</span>`;
    wrap.appendChild(d);
    setTimeout(() => d.classList.add('show'), i++ * 110);
  });
}

// ── UI helpers ─────────────────────────────────────────────────────────────
function showProgress(on) {
  document.getElementById('progress').style.display = on ? 'block' : 'none';
  if (on) ['s1','s2','s3','s4'].forEach(id => {
    const el = document.getElementById(id);
    el.classList.remove('active','done');
  });
}
function setStep(n, state) {
  const el = document.getElementById('s' + n);
  el.classList.remove('active','done');
  if (state) el.classList.add(state);
}
function showResults(data) {
  document.getElementById('nutrients').style.display   = 'block';
  document.getElementById('personality').style.display = 'block';
  document.getElementById('food-name').style.display   = 'block';
  document.getElementById('reset-btn').style.display   = 'block';
  document.getElementById('food-name').textContent     = data.name || '';
  document.getElementById('personality').textContent   = data.personality || '';
}
function hideResults() {
  ['nutrients','personality','food-name','reset-btn'].forEach(id => {
    document.getElementById(id).style.display = 'none';
  });
  document.getElementById('bubble-wrap').style.display = 'none';
}
function showErr(msg) {
  const e = document.getElementById('error');
  e.textContent = msg; e.style.display = 'block';
}
function clearErr() {
  document.getElementById('error').style.display = 'none';
}
function resetAll() {
  if (rafId)       cancelAnimationFrame(rafId);
  if (speechTimer) clearTimeout(speechTimer);
  if (window.speechSynthesis) window.speechSynthesis.cancel();
  rafId = null; speechTimer = null; baseCanvas = null;
  speechList = []; speechIdx = 0; talking = false; mouthOpen = false;

  document.getElementById('char-canvas').style.display = 'none';
  document.getElementById('placeholder').style.display = 'flex';
  document.getElementById('file-input').value = '';
  document.getElementById('n-cards').innerHTML = '';
  clearErr(); hideResults();
}
</script>
