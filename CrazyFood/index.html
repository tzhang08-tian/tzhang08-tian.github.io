<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CrazyFood</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Oswald:wght@200;300&family=Special+Elite&family=Lobster&family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }

:root {
  --bg:        #ffffff;
  --border:    #d8d8d8;
  --border-hi: #b8b8b8;
  --gray:      #999;
  --gray-mid:  #666;
  --gray-dk:   #444;
}

body {
  background: var(--bg);
  font-family: 'Times New Roman', Times, serif;
  font-size: 14px;
}

/* ── API Key Modal ── */
#api-modal {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.35);
  z-index: 500;
  display: flex; align-items: center; justify-content: center;
}
#api-dialog {
  background: #fff;
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 2rem 2.4rem;
  width: 360px;
}
#api-dialog h2 {
  font-size: 11px; font-weight: 700;
  letter-spacing: .18em; text-transform: uppercase;
  color: var(--gray-mid); margin-bottom: 1.2rem;
}
#api-has-key-msg {
  font-size: 14px; color: var(--gray-dk);
  line-height: 1.65; margin-bottom: 1.2rem;
}
#api-input-row {
  display: flex; gap: .5rem; margin-bottom: 1.2rem;
}
input[type=password] {
  flex: 1; background: #f0f0f0;
  border: 1px solid var(--border); border-radius: 6px;
  padding: .45rem .75rem; color: #111; font-size: 12px;
  outline: none; transition: border-color .15s; font-family: monospace;
}
input[type=password]:focus { border-color: var(--gray-mid); }

/* ── Full-screen layout ── */
.app {
  position: relative;
  width: 100vw; height: 100vh;
  overflow: hidden;
}

/* ── Character panel fills entire screen ── */
.char-panel {
  position: absolute; inset: 0;
  background: var(--bg);
}

#shadow-canvas {
  position: absolute; inset: 0;
  pointer-events: none; display: none;
}

#three-mount {
  position: absolute; inset: 0; display: none;
}

#face-canvas {
  position: absolute; inset: 0;
  pointer-events: none; display: none;
}

.placeholder {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 1.2rem;
}
#placeholder-text {
  display: flex; flex-wrap: nowrap;
  justify-content: center; align-items: center;
  white-space: nowrap;
  font-family: 'Lobster', cursive;
  font-size: 42px;
  -webkit-text-stroke: 1.2px #111;
  paint-order: stroke fill;
  cursor: default; user-select: none;
  filter: url(#retro-text-filter);
}
/* Nutrient fact hint — shown top-center when hovering a placeholder letter */
#ph-nutrient-hint {
  position: absolute;
  top: 1.6rem; left: 50%;
  transform: translateX(-50%);
  max-width: 70%;
  text-align: center;
  font-family: 'Times New Roman', Times, serif;
  font-size: 14px;
  line-height: 1.5;
  color: #999;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.25s ease;
}
#ph-nutrient-hint.show { opacity: 1; }
#ph-nutrient-hint b { color: #777; }
.ph-char {
  display: inline-block;
  animation: phFloat var(--pf-d, 3s) ease-in-out infinite var(--pf-a, 0s),
             phColor var(--pc-d, 4s) linear infinite var(--pc-a, 0s);
  translate: var(--flee-x, 0px) var(--flee-y, 0px);
  transition: translate 0.4s cubic-bezier(.25,.46,.45,.94);
}
.ph-space { display: inline-block; width: 18px; }
@keyframes phFloat {
  0%, 100% { transform: translateY(0px); }
  50%       { transform: translateY(var(--pf-h, -5px)); }
}
@keyframes phColor {
  0%   { color: hsl(0,45%,58%); }
  16%  { color: hsl(60,45%,52%); }
  33%  { color: hsl(120,45%,50%); }
  50%  { color: hsl(180,45%,50%); }
  66%  { color: hsl(240,45%,62%); }
  83%  { color: hsl(300,45%,58%); }
  100% { color: hsl(360,45%,58%); }
}

/* ── Spinning circle loading mode ── */
#placeholder-text.ph-spinning {
  display: block !important;
  position: relative;
  width: 500px; height: 500px;
  font-size: 42px;
  animation: phSpin 12s linear infinite;
  animation-play-state: paused; /* JS starts it after entry animation */
  white-space: normal;
}
@keyframes phSpin {
  to { transform: rotate(360deg); }
}
#placeholder-text.ph-spinning .ph-char,
#placeholder-text.ph-spinning .ph-space {
  position: absolute;
  left: 50%; top: 50%;
  margin-left: -0.3em; margin-top: -0.55em;
  /* suppress phFloat; keep phColor for rainbow shimmer */
  animation: phColor var(--pc-d, 4s) linear infinite var(--pc-a, 0s) !important;
  /* translate stays active so flee-mouse effect still works */
}
#placeholder-text.ph-spinning .ph-space {
  width: auto;
}

/* ── Nutrient list — top-left, items accumulate and stay ── */
#speech-display {
  position: absolute;
  top: 5rem; left: 1.6rem;
  z-index: 20; pointer-events: none;
  display: none;
  width: 380px;
  overflow: visible;
}
#speech-inner {
  transition: transform 0.18s ease-out;
  will-change: transform;
  transform-origin: left center;
}
#left-scroll-zone {
  position: absolute;
  top: 0; left: 0;
  width: 460px; height: 100%;
  z-index: 19;
  display: none;
  cursor: ns-resize;
}

@keyframes speechFloat {
  0%, 100% {
    transform: translateY(0px);
    filter: drop-shadow(0 3px 8px rgba(0,0,0,0.12));
  }
  50% {
    transform: translateY(-9px);
    filter: drop-shadow(0 14px 18px rgba(0,0,0,0.05));
  }
}

.speech-item {
  margin-bottom: 1.5rem;
  animation: speechFloat 4s ease-in-out infinite;
  will-change: transform;
}

.speech-item-label {
  font-family: 'Special Elite', 'Courier New', monospace;
  font-size: 11px; font-weight: 400;
  letter-spacing: .10em; text-transform: uppercase;
  color: var(--txt-label, var(--gray-mid)); margin-bottom: .38rem;
}

.speech-item-body {
  font-family: 'Special Elite', 'Courier New', monospace;
  font-size: 17px; line-height: 1.75;
  color: var(--txt-body, #111);
}
.speech-char {
  display: inline-block;
  animation: charFloat var(--cd, 2.5s) ease-in-out infinite var(--ca, 0s);
  scale: var(--sq-x, 1) 1;
  translate: var(--sq-tx, 0px) 0;
  transform-origin: left center;
}
.speech-char.reading {
  color: #e03020 !important;
  -webkit-text-stroke: 0px transparent !important;
}
@keyframes charFloat {
  0%, 100% { transform: translate(0, 0); }
  50%       { transform: translate(var(--cx, 0px), var(--cy, -2px)); }
}
@keyframes speechColor {
  0%   { color: hsl(0,45%,58%); }
  16%  { color: hsl(60,45%,52%); }
  33%  { color: hsl(120,45%,50%); }
  50%  { color: hsl(180,45%,50%); }
  66%  { color: hsl(240,45%,62%); }
  83%  { color: hsl(300,45%,58%); }
  100% { color: hsl(360,45%,58%); }
}

/* Layout wrapper — handles fly-to-top/bottom; inner .speech-item keeps the float anim */
.speech-item-wrap {
  position: relative;
  width: 380px;
}
/* Compact chip shown when items are in the column */
.speech-item-wrap.sp-compact .speech-item-body  { display: none; }
.speech-item-wrap.sp-compact .speech-item-label {
  white-space: nowrap;
  font-family: 'Lobster', cursive;
  font-size: 19px;
  letter-spacing: 0.03em;
  text-transform: none;
  -webkit-text-stroke: 1.8px #1a1a1a;
  paint-order: stroke fill;
  margin-bottom: 0;
  animation: speechColor var(--cc-d, 5s) linear infinite var(--cc-a, 0s),
             phFloat var(--pf-d, 3.5s) ease-in-out infinite var(--pf-a, 0s);
}

/* Retro sliders */
#retro-ctrl {
  position: absolute; bottom: 3.5rem; left: 50%; transform: translateX(-50%);
  display: flex; gap: 1.2rem; z-index: 15;
  background: rgba(8,8,8,.72); border: 1px solid var(--border);
  border-radius: 20px; padding: .35rem 1rem;
  font-size: 10px; color: var(--gray-mid); letter-spacing: .06em;
  align-items: center;
}
#retro-ctrl label { display: flex; align-items: center; gap: .4rem; }
#retro-ctrl input[type=range] {
  -webkit-appearance: none; appearance: none;
  width: 72px; height: 3px; background: var(--border-hi);
  border-radius: 2px; outline: none; cursor: pointer;
}
/* Default: white square — rolls via JS-driven --thumb-rot; rainbow via --thumb-bg/--thumb-glow */
#retro-ctrl input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 12px; height: 12px; border-radius: 2px;
  background: var(--thumb-bg, #fff);
  box-shadow: var(--thumb-glow, none);
  cursor: grab;
  transform: rotate(var(--thumb-rot, 0deg));
  transition: background 0.3s, box-shadow 0.3s;
}
#retro-ctrl input[type=range].dragging::-webkit-slider-thumb {
  cursor: grabbing;
  transition: none;
  transform: rotate(var(--thumb-rot, 0deg));
  background: var(--thumb-bg, #fff);
  box-shadow: var(--thumb-glow, none);
}
/* Firefox */
#retro-ctrl input[type=range]::-moz-range-thumb {
  width: 12px; height: 12px; border-radius: 2px; border: none;
  background: var(--thumb-bg, #fff);
  cursor: grab;
  transform: rotate(var(--thumb-rot, 0deg));
}
#retro-ctrl input[type=range].dragging::-moz-range-thumb {
  cursor: grabbing;
  background: var(--thumb-bg, #fff);
  transform: rotate(var(--thumb-rot, 0deg));
}

#hint-3d {
  position: absolute; bottom: 1.2rem; left: 50%; transform: translateX(-50%);
  font-size: 10px; color: var(--gray-mid); letter-spacing: .08em;
  background: rgba(8,8,8,.75); padding: .3rem .9rem; border-radius: 20px;
  border: 1px solid var(--border);
  pointer-events: none; opacity: 0; transition: opacity 1s;
  z-index: 10; white-space: nowrap;
}
#hint-3d.show { opacity: 1; }

/* ── Right overlay — no background, no border, just floating elements ── */
.right {
  position: absolute;
  top: 0; right: 0;
  width: 200px; height: 100%;
  z-index: 20;
  display: flex; flex-direction: column;
  align-items: flex-end;
  padding: 1.4rem 1.2rem;
  gap: .7rem;
  pointer-events: none;
}

/* Upload — compact square, top-right */
#upload-zone {
  width: 90px; height: 90px;
  border: 1px dashed var(--border-hi); border-radius: 10px;
  background: rgba(255,255,255,0.88);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: .3rem;
  cursor: pointer; position: relative;
  transition: border-color .2s, background .2s;
  color: var(--gray);
  pointer-events: all;
}
#upload-zone:hover, #upload-zone.over {
  border-color: var(--gray-mid); background: rgba(255,255,255,0.98);
}
#upload-zone .upload-plus { font-size: 26px; font-weight: 300; line-height: 1; }
#upload-zone .upload-hint { font-size: 9px; letter-spacing: .08em; text-transform: uppercase; }
#upload-zone input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }

/* Right-side text elements */
#error {
  display: none; font-size: 11px; color: #c00;
  line-height: 1.5; text-align: right; max-width: 180px;
}

#food-name {
  display: none;
  font-family: 'Cinzel', serif;
  font-size: 10px; font-weight: 700; letter-spacing: .14em;
  text-transform: uppercase; color: var(--gray-dk);
  text-align: right;
}

#progress { display: none; width: 100%; }
.step {
  display: flex; align-items: center; justify-content: flex-end;
  gap: .5rem; padding: .2rem 0; font-size: 9px;
  font-family: 'Cinzel', serif; letter-spacing: .12em; text-transform: uppercase;
  color: var(--gray); transition: color .3s;
}
.step.active { color: #111; }
.step.done   { color: var(--gray-mid); }
.dot {
  width: 5px; height: 5px; border-radius: 50%;
  background: var(--border-hi); flex-shrink: 0; transition: background .3s;
  order: 2;
}
.step span { order: 1; }
.step.active .dot { background: #111; animation: blink .7s infinite; }
.step.done   .dot { background: var(--gray-mid); animation: none; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.25} }

#personality {
  display: none;
  font-family: 'Cinzel', serif;
  font-size: 9px; color: var(--gray-mid);
  letter-spacing: .08em;
  line-height: 1.9;
  text-align: right; max-width: 180px;
}

button {
  background: #111; color: #fff;
  font-weight: 700; font-size: 11px; letter-spacing: .06em;
  border: none; border-radius: 6px; padding: .4rem .9rem;
  cursor: pointer; white-space: nowrap;
  transition: opacity .15s; font-family: 'Times New Roman', Times, serif;
  pointer-events: all;
}
button:hover { opacity: .75; }
button:disabled { opacity: .3; cursor: not-allowed; }
button.ghost {
  background: rgba(255,255,255,0.85);
  color: var(--gray-mid); border: 1px solid var(--border); font-weight: 400;
}
button.ghost:hover { border-color: var(--border-hi); color: #333; }

#reset-btn { display: none; }

@media (prefers-reduced-motion: reduce) {
  .dot { animation: none !important; }
}

/* ── Food Card button (top-center) ── */
#card-btn {
  position: fixed; top: .9rem; left: 50%; transform: translateX(-50%);
  z-index: 90; display: none;
  background: rgba(14,14,18,.82);
  color: rgba(255,255,255,.85);
  border: 1px solid rgba(255,255,255,.16);
  font-family: 'Cinzel', serif;
  font-size: 9px; letter-spacing: .16em; text-transform: uppercase;
  padding: .38rem 1rem; border-radius: 20px; cursor: pointer;
  white-space: nowrap;
  align-items: center; gap: .55rem;
  transition: background .2s, border-color .2s;
  pointer-events: all;
}
#card-btn.cb-show { display: flex; }
#card-btn:hover { background: rgba(30,30,36,.95); border-color: rgba(255,255,255,.32); }
#card-btn .cb-arrow { font-size: 14px; opacity: .7; }

/* ── Card view overlay ── */
#card-view {
  position: fixed; inset: 0; z-index: 300;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: .9rem;
  background: transparent;
  opacity: 0; pointer-events: none;
  transition: opacity .45s cubic-bezier(.4,0,.2,1);
  perspective: 1100px;
  perspective-origin: 50% 44%;
  overflow: hidden;
}
#card-view.cv-active { opacity: 1; pointer-events: all; }
/* Grayscale background: screenshot injected as --bg-img via JS */
#card-view::before {
  content: '';
  position: absolute; inset: 0; z-index: 0;
  background-image: var(--bg-img, none);
  background-size: 100% 100%;
  background-position: center;
  filter: grayscale(1) brightness(0.52) blur(1px);
  transform: scale(1.02); /* hide blur edge fringing */
  pointer-events: none;
}

#card-back-btn {
  position: fixed; top: 1rem; left: 1.2rem; z-index: 310;
  background: rgba(255,255,255,.08); border: 1px solid rgba(255,255,255,.18);
  color: rgba(255,255,255,.65); font-family: 'Cinzel', serif;
  font-size: 9px; letter-spacing: .12em; text-transform: uppercase;
  padding: .35rem .85rem; border-radius: 20px; cursor: pointer;
  transition: all .2s; pointer-events: all;
}
#card-back-btn:hover { background: rgba(255,255,255,.18); color: #fff; }

/* ── The food card ── */
.food-card {
  position: relative; z-index: 1;
  width: clamp(340px, 88vw, 430px);
  border-radius: 18px; overflow: hidden;
  border: 5px solid rgba(50,80,140,.65); /* color set by JS from theme */
  box-shadow:
    0 0 0 1px rgba(255,255,255,.08),
    0 32px 90px rgba(0,0,0,.80);
  opacity: 0;
  transition: opacity .35s ease;
  cursor: default;
  will-change: transform;
}
#card-view.cv-active .food-card { opacity: 1; }
/* holographic shine — position driven by --sx/--sy updated from JS tilt */
.food-card::after {
  content: ''; position: absolute; inset: 0; z-index: 200; pointer-events: none;
  background:
    radial-gradient(
      ellipse at calc(var(--sx, 50) * 1%) calc(var(--sy, 45) * 1%),
      rgba(255,255,255,.20) 0%,
      rgba(190,150,255,.14) 28%,
      rgba(100,220,255,.09) 54%,
      transparent 72%
    ),
    linear-gradient(118deg,
      transparent 32%, rgba(255,255,255,.04) 48%, rgba(180,140,255,.05) 56%, transparent 74%);
  border-radius: inherit;
  mix-blend-mode: screen;
}

/* card header */
.card-hdr {
  display: flex; align-items: center; gap: .42rem;
  padding: .52rem 80px .44rem .8rem; /* right padding keeps name away from the oval */
  position: relative;
}
.card-badge {
  font-family: 'Bebas Neue', sans-serif; font-size: 16px; font-weight: 400;
  letter-spacing: .1em; text-transform: uppercase;
  background: rgba(0,0,0,.28); color: rgba(255,255,255,.92);
  padding: .08rem .5rem .02rem; border-radius: 4px; flex-shrink: 0;
  border: 1px solid rgba(255,255,255,.2);
}
.card-name {
  font-family: 'Lobster', cursive;
  font-size: 24px; font-weight: 400;
  -webkit-text-stroke: 1.5px #111;
  paint-order: stroke fill;
  letter-spacing: .03em; text-transform: none;
  color: hsl(0,45%,58%);
  animation: phColor 5s linear infinite -1.2s;
  flex: 1; text-align: center;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.card-type-icon { display: none; }
/* Cal oval — direct child of food-card, floats above WebGL canvas */
.card-cal {
  position: absolute;
  right: 10px;
  top: 6px;
  width: 62px; height: 90px;
  z-index: 100;  /* must beat the GPU-composited WebGL canvas */
}
.cal-ring {
  position: absolute; inset: 0;
  border-radius: 50%;   /* ellipse on a tall element */
  border: 4px solid rgba(255,255,255,.60);
  pointer-events: all;
}
.cal-fill {
  position: absolute; inset: 4px;
  border-radius: 50%;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 2px;
  pointer-events: all;
}
.card-cal-label {
  display: block; font-size: 11px; letter-spacing: .18em;
  color: rgba(255,255,255,.7); text-transform: uppercase;
  font-family: 'Bebas Neue', sans-serif;
  line-height: 1;
}
.card-cal-num {
  font-family: 'Cinzel', serif; font-size: 21px; font-weight: 700;
  color: #fff; letter-spacing: -.02em; line-height: 1;
}
.card-type-icon { font-size: 18px; flex-shrink: 0; }

/* model area */
.card-model-area {
  position: relative; width: 100%; height: 355px;
  background: #08080e; overflow: hidden;
}
.card-model-area::after {
  content: ''; position: absolute; inset: 0; z-index: 2; pointer-events: none;
  background: radial-gradient(ellipse at 50% 50%, transparent 50%, rgba(6,6,10,.5) 100%);
}
.card-model-area #three-mount {
  position: absolute !important; inset: 0 !important; display: block !important;
}

/* italic subheader */
.card-subhdr {
  padding: .38rem .85rem; text-align: center;
  font-family: 'Special Elite', monospace; font-size: 8.5px; letter-spacing: .04em;
  font-style: italic; line-height: 1.55;
  color: rgb(var(--card-rgb, 50,80,140));
  background: rgba(var(--card-rgb, 50,80,140), .08);
  border-top: 1px solid rgba(var(--card-rgb, 50,80,140), .22);
  border-bottom: 1px solid rgba(var(--card-rgb, 50,80,140), .14);
}

/* ability/attack rows */
.card-body { background: #fafaf5; padding: .7rem .85rem .5rem; }
.card-attack { display: flex; align-items: flex-start; gap: .5rem; margin-bottom: .55rem; }
.card-attack + .card-attack { padding-top: .5rem; border-top: 1px solid #e8e8e0; }
.card-atk-icons {
  font-size: 9px; line-height: 1; padding-top: 3px; flex-shrink: 0;
  color: rgb(var(--card-rgb, 50,80,140)); letter-spacing: .05em;
}
.card-atk-main  { flex: 1; min-width: 0; }
.card-atk-name  {
  font-family: 'Cinzel', serif; font-size: 10.5px; font-weight: 700;
  letter-spacing: .05em; color: #111; margin-bottom: .12rem;
}
.card-atk-desc  { font-family: 'Special Elite', monospace; font-size: 8.5px; line-height: 1.55; color: #444; }
.card-atk-dmg   {
  font-family: 'Cinzel', serif; font-size: 17px; font-weight: 700;
  color: #111; flex-shrink: 0; padding-top: 2px; letter-spacing: -.01em;
}

/* rule box */
.card-rule {
  margin: 0 .65rem .48rem;
  border: 1px solid #d0ccc4; border-radius: 5px;
  padding: .3rem .55rem;
  background: rgba(238,235,228,.85);
  font-size: 8px; line-height: 1.6; color: #555;
  font-style: italic; font-family: 'Special Elite', monospace;
}

/* footer bar */
.card-footer {
  background: #dad8d2; border-top: 1px solid #c4c1ba;
  padding: .32rem .8rem;
  display: flex; align-items: center; gap: .28rem;
  font-size: 7.5px; color: #555;
  font-family: 'Cinzel', serif; letter-spacing: .05em;
}
.card-ftr-item { display: flex; align-items: center; gap: .25rem; }
.card-ftr-item .fi {
  font-size: 7px; text-transform: uppercase; letter-spacing: .06em;
  font-family: 'Cinzel', serif; font-weight: 700;
  color: rgb(var(--card-rgb, 50,80,140));

let rafId = null;

let textLayout = 'left'; // 'left' | 'topbottom'
const sliderDragging   = new Set(); // ids of sliders currently held by user
const sliderAutoMoving = new Set(); // ids of sliders moving due to auto-randomize
// Rolling rotation: accumulated angle per slider, driven by value delta each frame
const sliderRot  = { 'r-pixel': 0, 'r-levels': 0, 'r-dots': 0, 'r-crystal': 0, 'r-blur': 0 };
const sliderPrev = { 'r-pixel': 6, 'r-levels': 4, 'r-dots': 0, 'r-crystal': 0, 'r-blur': 0 };
// Degrees per unit — physics-based (track=72px, thumb=12px sq, circ≈37.7px)
const sliderDeg  = { 'r-pixel': 49, 'r-levels': 115, 'r-dots': 43, 'r-crystal': 22, 'r-blur': 34 };
// Rainbow state — driven by a dedicated RAF loop while any slider is dragging
let rainbowHue = 0;
let rainbowRaf = null;
function rainbowLoop() {
  if (sliderDragging.size === 0 && sliderAutoMoving.size === 0) { rainbowRaf = null; return; }
  rainbowHue = (rainbowHue + 3.5) % 360;
  const col = `hsl(${rainbowHue.toFixed(1)},100%,60%)`;
  sliderDragging.forEach(id => {
    const el = document.getElementById(id);
    if (el) {
      el.style.setProperty('--thumb-bg',   col);
      el.style.setProperty('--thumb-glow', `0 0 8px ${col}`);

  });
  sliderAutoMoving.forEach(id => {
    if (sliderDragging.has(id)) return; // dragging already handled above
    const el = document.getElementById(id);
    if (el) {
      el.style.setProperty('--thumb-bg',   col);
      el.style.setProperty('--thumb-glow', `0 0 8px ${col}`);

{

// ── Retro post-process shader ─────────────────────────────────────────────
const RetroShader = {
  uniforms: {
    tDiffuse:    { value: null },
    resolution:  { value: new THREE.Vector2(1, 1) },
    pixelSize:   { value: 6.0  },
    levels:      { value: 4.0  },
    saturation:  { value: 1.55 },
    halftone:    { value: 0.0  },
    dotSize:     { value: 8.0  },
    crystalize:  { value: 0.0  },
    crystalSize: { value: 12.0 },
    blurAmount:  { value: 0.0  },
  },
  vertexShader: `
    varying vec2 vUv;
    void main() { vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.0); }
  `,
  fragmentShader: `
    uniform sampler2D tDiffuse;
    uniform vec2  resolution;
    uniform float pixelSize;
    uniform float levels;
    uniform float saturation;
    uniform float halftone;
    uniform float dotSize;
    uniform float crystalize;
    uniform float crystalSize;
    uniform float blurAmount;
    varying vec2 vUv;

    // Pseudo-random 2-D hash for Voronoi seed placement
    vec2 voronoiHash(vec2 p) {
      p = vec2(dot(p, vec2(127.1, 311.7)), dot(p, vec2(269.5, 183.3)));
      return fract(sin(p) * 43758.5453);
    }

    // 5×5 weighted-tap Gaussian blur — radius (in px) grows with blurAmount
    vec4 gaussianSample(sampler2D tex, vec2 uv, vec2 res, float radiusPx) {
      vec2  texel = radiusPx / res;
      vec4  sum   = vec4(0.0);
      float wsum  = 0.0;
      for (int x = -2; x <= 2; x++) {
        for (int y = -2; y <= 2; y++) {
          float w = exp(-float(x*x + y*y) / 6.0);
          sum  += texture2D(tex, uv + vec2(float(x), float(y)) * texel) * w;
          wsum += w;
        }
      }
      return sum / wsum;
    }

    // Halftone dot mask: returns 1.0 if this fragment is inside a channel dot
    float htMask(vec2 fc, float ang, float cellSize, vec2 res, out vec2 sampleUv) {
      float c = cos(ang), s = sin(ang);
      vec2 rp   = vec2(fc.x*c - fc.y*s, fc.x*s + fc.y*c) / cellSize;
      vec2 cell = floor(rp) + 0.5;
      sampleUv  = clamp(vec2(cell.x*c + cell.y*s, -cell.x*s + cell.y*c) * cellSize / res, 0.0, 1.0);
      return length(rp - cell);
    }

    void main() {
      // ── Retro pass ──────────────────────────────────────────────────────
      vec2 block = pixelSize / resolution;
      vec2 uv    = block * floor(vUv / block);
      // Gaussian blur softens the source before retro/halftone/crystal stylize it
      vec4 col   = blurAmount > 0.05 ? gaussianSample(tDiffuse, uv, resolution, blurAmount)
                                     : texture2D(tDiffuse, uv);
      float lum  = dot(col.rgb, vec3(0.299, 0.587, 0.114));
      col.rgb    = mix(vec3(lum), col.rgb, saturation);
      col.rgb    = clamp(col.rgb, 0.0, 1.0);
      col.rgb    = floor(col.rgb * levels + 0.5) / levels;

      // ── Color halftone pass ─────────────────────────────────────────────
      vec2 fc = vUv * resolution;
      vec2 spR, spG, spB;

      // R channel at 15°, G at 75°, B at 45° (classic halftone angles)
      float distR = htMask(fc, 0.2618, dotSize, resolution, spR);
      float distG = htMask(fc, 1.3090, dotSize, resolution, spG);
      float distB = htMask(fc, 0.7854, dotSize, resolution, spB);

      // CMY inks: cyan = 1-R, magenta = 1-G, yellow = 1-B
      float iC = 1.0 - texture2D(tDiffuse, spR).r;
      float iM = 1.0 - texture2D(tDiffuse, spG).g;
      float iY = 1.0 - texture2D(tDiffuse, spB).b;

      // Dot radius grows with ink density; darker original = larger dot
      float mC = step(distR, sqrt(iC) * 0.65);
      float mM = step(distG, sqrt(iM) * 0.65);
      float mY = step(distB, sqrt(iY) * 0.65);

      // Subtractive CMY on white: each ink absorbs its complementary channel
      vec3 ht = vec3(1.0);
      ht.r -= mC * iC;   // cyan dot absorbs red
      ht.g -= mM * iM;   // magenta dot absorbs green
      ht.b -= mY * iY;   // yellow dot absorbs blue
      ht = clamp(ht, 0.0, 1.0);

      // Blend retro → halftone (alpha preserved from original render)
      col.rgb = mix(col.rgb, ht, halftone);

      // ── Crystallize (Voronoi) pass ────────────────────────────────────────
      if (crystalize > 0.001) {
        vec2 px      = vUv * resolution;
        vec2 cellId  = floor(px / crystalSize);
        float minD   = 1.0e9;
        vec2 nearUV  = vUv;
        for (int j = -1; j <= 1; j++) {
          for (int i = -1; i <= 1; i++) {
            vec2 nb   = cellId + vec2(float(i), float(j));
            vec2 seed = nb + voronoiHash(nb);       // seed inside cell (0-1 offset)
            float d   = length(px - seed * crystalSize);
            if (d < minD) {
              minD    = d;
              nearUV  = clamp(seed * crystalSize / resolution, 0.0, 1.0);
            }
          }
        }
        vec4 cSamp = texture2D(tDiffuse, nearUV);
        // Quantize cell colours for the flat-polygon look
        cSamp.rgb  = floor(cSamp.rgb * levels + 0.5) / levels;
        col        = mix(col, cSamp, crystalize);
      }

      gl_FragColor = col;
    }
  `,
};

// Auto-randomize retro values on a random 3–10 s interval with smooth slide.
// ~18% passthrough | ~16% color halftone | ~20% retro pixel | ~20% crystallize | ~26% blur
function scheduleRetroRandomize() {
  const delay = (Math.random() * 7 + 3) * 1000;
  setTimeout(() => {
    if (cardViewActive) { scheduleRetroRandomize(); return; }
    const r = Math.random();
    if (r < 0.18) {
      // Passthrough: shader becomes identity
      pixelTarget    = 1;   levelsTarget   = 255;
      halftoneTarget = 0;   crystalTarget  = 0;   blurTarget = 0;
    } else if (r < 0.34) {
      // Color halftone
      pixelTarget    = 1;   levelsTarget   = 255;
      halftoneTarget = 1;   crystalTarget  = 0;   blurTarget = 0;
      dotSizeTarget  = Math.floor(Math.random() * 12 + 4);
    } else if (r < 0.54) {
      // Retro pixel + quantization
      pixelTarget    = Math.floor(Math.random() * 15 + 2);
      levelsTarget   = Math.floor(Math.random() * 7  + 2);
      halftoneTarget = 0;   crystalTarget  = 0;   blurTarget = 0;
    } else if (r < 0.74) {
      // Crystallize — auto-clears after 3 s max
      pixelTarget    = 1;   levelsTarget   = Math.floor(Math.random() * 6 + 2);
      halftoneTarget = 0;   crystalTarget  = 1;   blurTarget = 0;
      crystalSizeTarget = Math.floor(Math.random() * 50 + 5);
      clearTimeout(crystalTimeout);
      crystalTimeout = setTimeout(() => { crystalTarget = 0; }, 3000);
    } else {
      // Gaussian blur — auto-clears after 3 s max, same pattern as crystallize
      pixelTarget    = 1;   levelsTarget   = 255;
      halftoneTarget = 0;   crystalTarget  = 0;
      blurTarget = Math.floor(Math.random() * 14 + 4);
      clearTimeout(blurTimeout);
      blurTimeout = setTimeout(() => { blurTarget = 0; }, 3000);
    }
    scheduleRetroRandomize();
  }, delay);
}
scheduleRetroRandomize();

// ── Retro effects loop — always running (even before a model is loaded),
// drives both the 3D model's shader (when present) and the homepage
// placeholder text, so #retro-ctrl affects both "in the same form" ─────────
function updateRetroEffects() {
  // Lerp retro values toward their targets (~2 s transition at 60 fps)
  pixelCur      += (pixelTarget      - pixelCur)      * 0.025;
  levelsCur     += (levelsTarget     - levelsCur)     * 0.025;
  halftoneCur   += (halftoneTarget   - halftoneCur)   * 0.025;
  dotSizeCur    += (dotSizeTarget    - dotSizeCur)    * 0.025;
  crystalCur    += (crystalTarget    - crystalCur)    * 0.18;
  crystalSizeCur+= (crystalSizeTarget- crystalSizeCur)* 0.18;
  blurCur       += (blurTarget       - blurCur)       * 0.07;
  if (retroPass) {
    retroPass.uniforms.pixelSize.value   = pixelCur;
    retroPass.uniforms.levels.value      = levelsCur;
    retroPass.uniforms.halftone.value    = halftoneCur;
    retroPass.uniforms.dotSize.value     = dotSizeCur;
    retroPass.uniforms.crystalize.value  = crystalCur;
    retroPass.uniforms.crystalSize.value = Math.max(2, crystalSizeCur);
    retroPass.uniforms.blurAmount.value  = blurCur;
  }

  // Mirror lerped values back to sliders so the thumb slides smoothly during auto-changes
  if (!sliderDragging.has('r-pixel'))   document.getElementById('r-pixel').value   = Math.round(Math.max(2, pixelCur));
  if (!sliderDragging.has('r-levels'))  document.getElementById('r-levels').value  = Math.round(Math.max(2, levelsCur));
  if (!sliderDragging.has('r-dots'))    document.getElementById('r-dots').value    = Math.round(halftoneCur * dotSizeCur);
  if (!sliderDragging.has('r-crystal')) document.getElementById('r-crystal').value = crystalCur < 0.05 ? 0 : Math.round(crystalSizeCur);
  if (!sliderDragging.has('r-blur'))    document.getElementById('r-blur').value    = Math.round(Math.max(0, blurCur));

  // Roll each thumb: accumulate rotation proportional to value delta (right=CW, left=CCW)
  // Also drive rainbow color for auto-movement (not just user drag)
  ['r-pixel', 'r-levels', 'r-dots', 'r-crystal', 'r-blur'].forEach(id => {
    const el  = document.getElementById(id);
    const cur = +el.value;
    const delta = cur - sliderPrev[id];
    sliderPrev[id] = cur;
    sliderRot[id] += delta * sliderDeg[id];
    el.style.setProperty('--thumb-rot', sliderRot[id].toFixed(1) + 'deg');

    if (!sliderDragging.has(id)) {
      // Check underlying float convergence, not integer delta (delta is 0 most lerp frames)
      const isMoving = id === 'r-pixel'
        ? Math.abs(pixelCur - pixelTarget) > 0.15
        : id === 'r-levels'
        ? Math.abs(levelsCur - levelsTarget) > 0.15
        : id === 'r-dots'
        ? Math.abs(halftoneCur - halftoneTarget) > 0.01 || Math.abs(dotSizeCur - dotSizeTarget) > 0.15
        : id === 'r-crystal'
        ? Math.abs(crystalCur - crystalTarget) > 0.01 || Math.abs(crystalSizeCur - crystalSizeTarget) > 0.15
        : Math.abs(blurCur - blurTarget) > 0.15;
      if (isMoving) {
        sliderAutoMoving.add(id);
        if (!rainbowRaf) rainbowRaf = requestAnimationFrame(rainbowLoop);
      } else if (sliderAutoMoving.has(id)) {
        sliderAutoMoving.delete(id);
        el.style.removeProperty('--thumb-bg');
        el.style.removeProperty('--thumb-glow');
      }
    }
  });

  applyPlaceholderRetro();
}

// Apply the same retro values to the homepage placeholder text via an SVG
// filter (#retro-text-filter) plus a halftone-dot overlay — same lerped
// state (pixelCur/halftoneCur/dotSizeCur/crystalCur/crystalSizeCur/blurCur)

function applyPlaceholderRetro() {

// ── Pipeline ──────────────────────────────────────────────────────────────
async function handleFile(file) {
  if (!API_KEY) { showErr('Please enter your API key (reload the page).'); return; }
  clearErr();
  // Prime TTS engine while user gesture is still active (before async calls expire the gesture context)
  if (window.speechSynthesis) {
    const primer = new SpeechSynthesisUtterance('.');
    primer.volume = 0.001;
    primer.rate = 10;
    window.speechSynthesis.cancel();
    window.speechSynthesis.speak(primer);
  }
  let dataUrl = await fileToDataUrl(file);
  let mimeType = file.type;
  if (file.size > 4 * 1024 * 1024) {
    dataUrl = await compressImage(dataUrl);
    mimeType = 'image/jpeg';
  }
  const b64 = dataUrl.split(',')[1];

  showProgress(true);
  hideResults();
  faceFeatures = null;

  try {
    setStep(1, 'active');
    const facePromise = loadOnePresetFeatures(
      PRESET_FACES[Math.floor(Math.random() * PRESET_FACES.length)]
    );
    const [data, features] = await Promise.all([
      analyzeFood(b64, mimeType),
      facePromise.catch(e => { console.warn('face load failed:', e); return null; }),
    ]);
    faceFeatures = features;
    setStep(1, 'done');

    setStep(2, 'active');
    const img = await loadImg(dataUrl);
    await buildThreeScene(img, data);
    setStep(2, 'done');

    setStep(3, 'active');
    setStep(3, 'done');

    setStep(4, 'active');
    if (window.speechSynthesis) window.speechSynthesis.cancel();
    if (speechTimer) { clearTimeout(speechTimer); speechTimer = null; }
    speechList = data.speeches || [];
    speechIdx = 0;
    startSpeech();
    setStep(4, 'done');

    showProgress(false);
    showResults(data);
  } catch (err) {
    showProgress(false);
    showErr('Error: ' + err.message);
    console.error(err);
  }
}

function fileToDataUrl(file) {
  return new Promise(res => {
    const r = new FileReader();
    r.onload = () => res(r.result);
    r.readAsDataURL(file);
  });
}

function compressImage(dataUrl) {
  // Anthropic's 5 MB limit applies to the base64-encoded string length.
  // Base64 is ~4/3 of raw size, so target raw ≤ 3.5 MB → base64 ≤ ~4.7 MB (safely under 5 MB).
  const MAX_B64_CHARS = 3.5 * 1024 * 1024 * (4 / 3);
  return new Promise((res, rej) => {
    const img = new Image();
    img.onerror = () => rej(new Error('Could not load image for compression'));
    img.onload = () => {
      let W = img.naturalWidth, H = img.naturalHeight;
      // Scale longest side to ≤ 1920 px first
      const maxDim = 1920;
      if (W > maxDim || H > maxDim) {
        const s = maxDim / Math.max(W, H);
        W = Math.round(W * s); H = Math.round(H * s);
      }
      const canvas = document.createElement('canvas');
      canvas.width = W; canvas.height = H;
      canvas.getContext('2d').drawImage(img, 0, 0, W, H);
      let quality = 0.82, result;
      do {
        result = canvas.toDataURL('image/jpeg', quality);
        // b64 payload length (after the data:…, prefix)
        const b64Len = result.length - result.indexOf(',') - 1;
        if (b64Len <= MAX_B64_CHARS || quality <= 0.20) break;
        quality = Math.round((quality - 0.1) * 100) / 100;
      } while (true);
      res(result);
    };
    img.src = dataUrl;
  });
}

function loadImg(src) {
  return new Promise((res, rej) => {
    const i = new Image();
    i.onload = () => res(i); i.onerror = rej; i.src = src;
  });
}

// ── Claude API ────────────────────────────────────────────────────────────
async function claude(system, content) {
  const r = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'x-api-key': API_KEY,
      'anthropic-version': '2023-06-01',
      'content-type': 'application/json',
      'anthropic-dangerous-direct-browser-access': 'true'
    },
    body: JSON.stringify({
      model: 'claude-opus-4-5',
      max_tokens: 1600,
      system,
      messages: [{ role: 'user', content }]
    })
  });
  if (!r.ok) throw new Error(`API ${r.status}: ${await r.text()}`);
  return (await r.json()).content[0].text;
}

async function analyzeFood(b64, mime) {
