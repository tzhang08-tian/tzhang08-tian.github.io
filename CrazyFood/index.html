// Capture #food-card as a flat 2D image (no 3D tilt, no colour darkening)
async function captureCardImage() {
  const card         = document.getElementById('food-card');
  const cv           = document.getElementById('card-view');
  const modelArea    = document.getElementById('card-model-area');
  const glCanvas     = renderer?.domElement;
  const shadowCanvas = document.getElementById('shadow-canvas');

  // 1. Pause tilt RAF
  if (cardRaf) { cancelAnimationFrame(cardRaf); cardRaf = null; }

  // 2. Flatten card (remove 3D perspective + tilt)
  const prevPerspective = cv.style.perspective;
  const prevPerspOrigin = cv.style.perspectiveOrigin;
  const prevTransform   = card.style.transform;
  const prevWillChange  = card.style.willChange;
  cv.style.perspective       = 'none';
  cv.style.perspectiveOrigin = '50% 50%';
  card.style.transform       = 'none';
  card.style.willChange      = 'auto';

  await new Promise(r => requestAnimationFrame(() => requestAnimationFrame(r)));

  // Record model area position relative to card (flat, no 3D tilt)
  const flatCardRect  = card.getBoundingClientRect();
  const flatModelRect = modelArea.getBoundingClientRect();

  // 3. Strip the card's own backgroundImage (full-scene JPEG from card-open)
  const prevBgImg  = card.style.backgroundImage;
  const prevBgSize = card.style.backgroundSize;
  const prevBgPos  = card.style.backgroundPosition;
  card.style.backgroundImage    = 'none';
  card.style.backgroundSize     = '';
  card.style.backgroundPosition = '';

  // 4. Composite model area into a single 2D canvas in the correct stacking order:
  //      bg colour → shadow canvas → WebGL food model → (vignette stays in DOM for html2canvas)
  //
  //    IMPORTANT: in the live view the shadow-canvas sits BELOW the WebGL canvas.
  //    If we just hide the WebGL canvas and leave shadow-canvas visible, html2canvas
  //    renders the shadow ON TOP of whatever backgroundImage we set, which darkens
  //    the model.  We bake all three layers here so html2canvas only sees one opaque
  //    <img> element and the ::after vignette.
  let modelImg = null;
  let resultCanvas;
  try {
    if (glCanvas && glCanvas.width > 0 && glCanvas.height > 0 && renderer && composer) {
      // Render one clean frame with transparent background (matches live-view clearColor)
      composer.render();

      const W = glCanvas.width, H = glCanvas.height;
      const offC = document.createElement('canvas');
      offC.width = W; offC.height = H;
      const ctx = offC.getContext('2d');

      // Layer 1 – solid background colour
      ctx.fillStyle = modelArea.style.background || '#08080e';
      ctx.fillRect(0, 0, W, H);

      // Layer 2 – shadow (2D canvas, transparent where no shadow)
      if (shadowCanvas && shadowCanvas.style.display !== 'none'
          && shadowCanvas.width > 0 && shadowCanvas.height > 0) {
        ctx.drawImage(shadowCanvas, 0, 0, W, H);
      }

      // Layer 3 – WebGL food model (transparent bg; drawImage lets the browser apply
      //            its colour-management pipeline so brightness matches the live view)
      ctx.drawImage(glCanvas, 0, 0);

      // Use <img> element — html2canvas handles <img> more reliably than backgroundImage
      modelImg = document.createElement('img');
      modelImg.src = offC.toDataURL('image/png');
      modelImg.style.cssText =
        'position:absolute;left:0;top:0;width:100%;height:100%;' +
        'object-fit:fill;display:block;z-index:1;pointer-events:none;';
      modelArea.appendChild(modelImg);
    }

    // 5. Hide WebGL canvas and shadow canvas — their content is baked into modelImg
    if (glCanvas)     glCanvas.style.visibility     = 'hidden';
    if (shadowCanvas) shadowCanvas.style.visibility = 'hidden';

    // Wait for the img to load (data URL is synchronous but rAF flushes layout)
    if (modelImg && !modelImg.complete) {
      await new Promise(r => { modelImg.onload = r; modelImg.onerror = r; });
    }
    await new Promise(r => requestAnimationFrame(r));

    // 6. Capture (html2canvas sees: card CSS + <img> model + ::after vignette; no WebGL)
    resultCanvas = await html2canvas(card, {
      allowTaint:      true,
      useCORS:         false,
      scale:           2,
      logging:         false,
      backgroundColor: null,
      ignoreElements:  el => el.id === 'lib-add-btn' || el.id === 'card-back-btn',
    });
  } finally {
    // 7. Always restore DOM state — runs even if html2canvas throws
    if (modelImg && modelImg.parentElement === modelArea) modelArea.removeChild(modelImg);
    if (glCanvas)     glCanvas.style.visibility     = '';
    if (shadowCanvas) shadowCanvas.style.visibility = '';
    card.style.backgroundImage    = prevBgImg;
    card.style.backgroundSize     = prevBgSize;
    card.style.backgroundPosition = prevBgPos;
    cv.style.perspective       = prevPerspective;
    cv.style.perspectiveOrigin = prevPerspOrigin;
    card.style.transform       = prevTransform;
    card.style.willChange      = prevWillChange;
    if (cardViewActive && !cardRaf) cardRaf = requestAnimationFrame(cardTiltLoop);
  }

  // 8. Post-process: boost brightness + saturation, soften contrast on model area only.
  //    The WebGL→html2canvas pipeline consistently captures the model darker than the
  //    live view; this corrective step brings it back in line.
  const SCALE = 2; // matches html2canvas scale option
  const mx = Math.round((flatModelRect.left - flatCardRect.left) * SCALE);
  const my = Math.round((flatModelRect.top  - flatCardRect.top)  * SCALE);
  const mw = Math.round(flatModelRect.width  * SCALE);
  const mh = Math.round(flatModelRect.height * SCALE);

  const postCanvas = document.createElement('canvas');
  postCanvas.width  = resultCanvas.width;
  postCanvas.height = resultCanvas.height;
  const postCtx = postCanvas.getContext('2d');

  // Draw the full captured card first
  postCtx.drawImage(resultCanvas, 0, 0);

  // Extract model area, apply filter, paint back
  const adjCanvas = document.createElement('canvas');
  adjCanvas.width  = mw;
  adjCanvas.height = mh;
  const adjCtx = adjCanvas.getContext('2d');
  adjCtx.filter = 'brightness(1.08) saturate(1.05) contrast(0.96)';
  adjCtx.drawImage(resultCanvas, mx, my, mw, mh, 0, 0, mw, mh);
  postCtx.drawImage(adjCanvas, mx, my);

  return postCanvas.toDataURL('image/jpeg', 0.95);
}

// Fly the captured image from card position to dock, then add thumbnail
function flyCardOut(imageDataUrl) {
  const card = document.getElementById('food-card');
  const rect = card.getBoundingClientRect();
  const dock = document.getElementById('lib-dock');
  const dockRect = dock.getBoundingClientRect();

  const tw = 174, th = 243;
  const tx = window.innerWidth - tw - 60;
  const ty = window.innerHeight - th - 60;

  const img = document.createElement('img');
  img.src = imageDataUrl;
  img.className = 'lib-fly-clone';
  Object.assign(img.style, {
    left: rect.left + 'px',
    top:  rect.top  + 'px',
    width:  rect.width  + 'px',
    height: rect.height + 'px',
  });
  document.body.appendChild(img);

  // Force layout before transition
  void img.getBoundingClientRect();

  requestAnimationFrame(() => {
    Object.assign(img.style, {
      left:   tx + 'px',
      top:    ty + 'px',
      width:  tw + 'px',
      height: th + 'px',
      borderRadius: '7px',
      opacity: '0',
    });
  });

  setTimeout(() => img.remove(), 640);
}

async function addCardToLibrary() {
  const btn     = document.getElementById('lib-add-btn');
  const backBtn = document.getElementById('card-back-btn');
  btn.disabled     = true;
  backBtn.disabled = true;

  try {
    const imageDataUrl = await captureCardImage();
    const foodName = document.getElementById('cc-name').textContent;
    const calories = document.getElementById('cc-cal').textContent;

    const cards = libLoad();
    cards.push({ id: Date.now(), timestamp: new Date().toISOString(), imageDataUrl, foodName, calories });
    libSave(cards);

    // Re-enable before exit so next card open finds buttons ready
    btn.disabled     = false;
    backBtn.disabled = false;

    flyCardOut(imageDataUrl);
    // Begin exiting card view at same time as fly
    setTimeout(() => exitCardView(false), 60);
    // Render dock after fly lands
    setTimeout(() => libRenderDock(), 660);
  } catch (err) {
    console.error('Card capture failed:', err);
    btn.disabled     = false;
    backBtn.disabled = false;
  }
}

function libRenderDock() {
  const dock = document.getElementById('lib-dock');
  dock.innerHTML = '';
  const cards = libLoad();
  if (!cards.length) return;

  const top    = cards[cards.length - 1];
  const behind = cards.length > 1 ? cards[cards.length - 2] : null;

  // Behind card first (lower z-index, tilted)
  if (behind) {
    const wrap = document.createElement('div');
    wrap.className = 'lib-thumb-wrap lib-thumb-behind';
    const img = document.createElement('img');
    img.className = 'lib-thumb';
    img.src = behind.imageDataUrl;
    img.alt = behind.foodName;
    img.draggable = false;
    wrap.appendChild(img);
    wrap.addEventListener('click', libOpen);
    dock.appendChild(wrap);
  }

  // Top card (straight, on top)
  const wrapTop = document.createElement('div');
  wrapTop.className = 'lib-thumb-wrap lib-thumb-top';
  const imgTop = document.createElement('img');
  imgTop.className = 'lib-thumb';
  imgTop.src = top.imageDataUrl;
  imgTop.alt = top.foodName;
  imgTop.draggable = false;
  wrapTop.appendChild(imgTop);

  // Count badge shows total when more than 1 card
  if (cards.length > 1) {
    const badge = document.createElement('span');
    badge.className = 'lib-thumb-count';
    badge.textContent = cards.length;
    wrapTop.appendChild(badge);
  }

  wrapTop.addEventListener('click', libOpen);
  dock.appendChild(wrapTop);
}

function libOpen() {
  const overlay = document.getElementById('lib-overlay');
  overlay.style.display = 'flex';
  requestAnimationFrame(() => overlay.classList.add('lib-open'));
  document.querySelector('.app').classList.add('lib-bw');
  libRenderGrid();
}

function libClose() {
  const overlay = document.getElementById('lib-overlay');
  overlay.classList.remove('lib-open');
  document.querySelector('.app').classList.remove('lib-bw');
  setTimeout(() => { overlay.style.display = 'none'; }, 320);
}

// ── Long-press delete menu ────────────────────────────────────────────────────
let libMenuTargetId = null;
const LONG_PRESS_MS = 550;

function libShowMenu(cardId, anchorEl) {
  libMenuTargetId = cardId;
  const menu = document.getElementById('lib-delete-menu');
  const r = anchorEl.getBoundingClientRect();
  // Position menu centred above the card, clamped to viewport
  let left = r.left + r.width / 2 - 90;
  let top  = r.top - 54;
  left = Math.max(8, Math.min(left, window.innerWidth  - 188));
  top  = Math.max(8, Math.min(top,  window.innerHeight - 60));
  menu.style.left = left + 'px';
  menu.style.top  = top  + 'px';
  menu.classList.add('lib-menu-open');
}

function libHideMenu() {
  document.getElementById('lib-delete-menu').classList.remove('lib-menu-open');
  // Remove highlight from all items
  document.querySelectorAll('.lib-card-item.lib-long-pressed')
    .forEach(el => el.classList.remove('lib-long-pressed'));
  libMenuTargetId = null;
}

document.getElementById('lib-delete-btn').addEventListener('click', () => {
  if (!libMenuTargetId) return;
  const cards = libLoad().filter(c => c.id !== libMenuTargetId);
  libSave(cards);
  libHideMenu();
  libRenderGrid();
  libRenderDock();
});

// Close menu when clicking outside
document.addEventListener('pointerdown', e => {
  const menu = document.getElementById('lib-delete-menu');
  if (!menu.classList.contains('lib-menu-open')) return;
  if (!menu.contains(e.target)) libHideMenu();
}, true);

function libAttachLongPress(item, card) {
  let pressTimer = null;
  let didLongPress = false;
  let startX = 0, startY = 0;

  const cancel = () => {
    clearTimeout(pressTimer);
    pressTimer = null;
    item.classList.remove('lib-long-pressed');
  };

  const onDown = e => {
    didLongPress = false;
    startX = (e.touches ? e.touches[0].clientX : e.clientX);
    startY = (e.touches ? e.touches[0].clientY : e.clientY);
    pressTimer = setTimeout(() => {
      didLongPress = true;
      item.classList.add('lib-long-pressed');
      if (navigator.vibrate) navigator.vibrate(30);
      libShowMenu(card.id, item);
    }, LONG_PRESS_MS);
  };

  const onMove = e => {
    const cx = (e.touches ? e.touches[0].clientX : e.clientX);
    const cy = (e.touches ? e.touches[0].clientY : e.clientY);
    if (Math.abs(cx - startX) > 8 || Math.abs(cy - startY) > 8) cancel();
  };

  const onUp = e => {
    cancel();
    // If long press fired, suppress the click so card doesn't zoom open
    if (didLongPress) {
      didLongPress = false;
      e.stopPropagation();
      e.preventDefault();
    }
  };

  item.addEventListener('mousedown',  onDown);
  item.addEventListener('touchstart', onDown, { passive: true });
  item.addEventListener('mousemove',  onMove);
  item.addEventListener('touchmove',  onMove, { passive: true });
  item.addEventListener('mouseup',    onUp);
  item.addEventListener('touchend',   onUp);
  item.addEventListener('mouseleave', cancel);
  item.addEventListener('contextmenu', e => e.preventDefault()); // suppress browser ctx menu on long press
}

function libRenderGrid() {
  const grid = document.getElementById('lib-grid');
  grid.innerHTML = '';
  libHideMenu();
  const cards = libLoad();

  if (!cards.length) {
    const empty = document.createElement('div');
    empty.id = 'lib-empty';
    empty.textContent = 'No cards saved yet.';
    grid.appendChild(empty);
    return;
  }

  cards.forEach(card => {
    const item = document.createElement('div');
    item.className = 'lib-card-item';

    const img = document.createElement('img');
    img.src = card.imageDataUrl;
    img.alt = card.foodName;
    img.draggable = false;

    item.appendChild(img);
    item.addEventListener('click', () => {
      if (document.getElementById('lib-delete-menu').classList.contains('lib-menu-open')) {
        libHideMenu(); return;
      }
      libZoomOpen(card);
    });
    libAttachLongPress(item, card);
    grid.appendChild(item);
  });
}

// ── Library live-3D mode ────────────────────────────────────────────────────
let libLiveMode = false;

let _libLiveHideTimer = null;

function libLiveEnter() {
  libLiveMode = true;
  if (_libLiveHideTimer) { clearTimeout(_libLiveHideTimer); _libLiveHideTimer = null; }
  // Fade out then hide library overlay
  const libOverlay = document.getElementById('lib-overlay');
  libOverlay.classList.remove('lib-open');
  _libLiveHideTimer = setTimeout(() => { libOverlay.style.display = 'none'; _libLiveHideTimer = null; }, 320);
  // Restore full colour on main app
  document.querySelector('.app').classList.remove('lib-bw');
  // Show live bar
  document.getElementById('lib-live-bar').classList.add('active');
}

function libLiveExit() {
  libLiveMode = false;
  document.getElementById('lib-live-bar').classList.remove('active');
  libOpen();  // reopen library
}

document.getElementById('lib-live-back-btn').addEventListener('click', libLiveExit);

// ── Zoom / static view ──────────────────────────────────────────────────────
function libZoomOpen(card) {
  // If a live 3D model is currently loaded, surface the interactive card view
  if (cardViewActive && mesh) {
    libLiveEnter();
    return;
  }

  // Fallback: show static JPEG in zoom overlay
  const overlay = document.getElementById('lib-zoom-overlay');
  document.getElementById('lib-zoom-img').src = card.imageDataUrl;

  // Wire download button for this card
  const dlBtn = document.getElementById('lib-download-btn');
  dlBtn.onclick = e => {
    e.stopPropagation();
    const tmpImg = new Image();
    tmpImg.onload = () => {
      const cv = document.createElement('canvas');
      cv.width = tmpImg.naturalWidth;
      cv.height = tmpImg.naturalHeight;
      cv.getContext('2d').drawImage(tmpImg, 0, 0);
      const a = document.createElement('a');
      a.href = cv.toDataURL('image/png');
      a.download = (card.foodName || 'card').replace(/\s+/g, '_') + '.png';
      a.click();
    };
    tmpImg.src = card.imageDataUrl;
  };

  overlay.style.display = 'flex';
  requestAnimationFrame(() => overlay.classList.add('lib-open'));
}

function libZoomClose() {
  const overlay = document.getElementById('lib-zoom-overlay');
  overlay.classList.remove('lib-open');
  setTimeout(() => { overlay.style.display = 'none'; }, 240);
}

// Wire up events
document.getElementById('lib-add-btn').addEventListener('click', addCardToLibrary);
document.getElementById('lib-close-btn').addEventListener('click', libClose);
document.getElementById('lib-zoom-overlay').addEventListener('click', e => {
  if (!e.target.closest('#lib-zoom-inner')) libZoomClose();
});

// Escape closes zoom → live mode → library
document.addEventListener('keydown', e => {
  if (e.key !== 'Escape') return;
  if (document.getElementById('lib-zoom-overlay').classList.contains('lib-open')) {
    libZoomClose();
  } else if (libLiveMode) {
    libLiveExit();
  } else if (document.getElementById('lib-overlay').classList.contains('lib-open')) {
    libClose();
  }
});

// Restore dock on page load
libRenderDock();

function resetAll() {
  if (cardViewActive) exitCardView(true);
  if (rafId)       { cancelAnimationFrame(rafId); rafId = null; }
  if (speechTimer)   { clearTimeout(speechTimer);   speechTimer   = null; }
  if (crystalTimeout){ clearTimeout(crystalTimeout); crystalTimeout = null; }
  if (blurTimeout)   { clearTimeout(blurTimeout);    blurTimeout    = null; }
  if (currentAudio) { currentAudio.pause(); currentAudio = null; }
  if (window.speechSynthesis) window.speechSynthesis.cancel();
  speechList = []; speechIdx = 0; talking = false; mouthOpen = false;
  currentFaceData = null; faceFeatures = null;
  extraMeshes.forEach(m => {
    if (scene) scene.remove(m);
    m.geometry.dispose();
    Array.isArray(m.material) ? m.material.forEach(mt=>mt.dispose()) : m.material.dispose();
  });
  extraMeshes = [];
  document.getElementById('three-mount').style.display = 'none';
  stopLoadingSpinner();
  document.getElementById('placeholder').style.display = 'flex';
  const sc = document.getElementById('shadow-canvas');
  sc.style.display = 'none';
  if (shadowCtx2D) { shadowCtx2D.clearRect(0, 0, sc.width, sc.height); shadowCtx2D = null; }
  document.getElementById('file-input').value = '';
  clearErr(); hideResults();
}
</script>
