// ── Face feature extraction ───────────────────────────────────────────────
async function extractFaceFeatures(img) {
  const c = document.createElement('canvas');
  const maxDim = 768;
  const scale = Math.min(1, maxDim / Math.max(img.naturalWidth, img.naturalHeight));
  c.width  = Math.round(img.naturalWidth  * scale);
  c.height = Math.round(img.naturalHeight * scale);
  c.getContext('2d').drawImage(img, 0, 0, c.width, c.height);
  const b64 = c.toDataURL('image/jpeg', 0.88).split(',')[1];

  const sys = `You are a face landmark detector.
Respond ONLY with valid JSON (no markdown) matching this schema exactly:
{"leftEye":{"x":0.0,"y":0.0,"w":0.0,"h":0.0},"rightEye":{"x":0.0,"y":0.0,"w":0.0,"h":0.0},"nose":{"x":0.0,"y":0.0,"w":0.0,"h":0.0},"mouth":{"x":0.0,"y":0.0,"w":0.0,"h":0.0}}
x,y=top-left (0-1 normalized), w,h=width/height (0-1 normalized). Include ~25% padding.`;

  const raw = await claude(sys, [
    { type: 'image', source: { type: 'base64', media_type: 'image/jpeg', data: b64 } },
    { type: 'text', text: 'Return the facial feature bounding boxes for this portrait.' }
  ]);
  return JSON.parse(raw.replace(/```json\n?/g, '').replace(/```\n?/g, '').trim());
}

function cropFaceFeatures(img, boxes) {
  const W = img.naturalWidth, H = img.naturalHeight;
  const result = {};
  for (const [name, box] of Object.entries(boxes)) {
    const sx = Math.max(0, Math.round(box.x * W));
    const sy = Math.max(0, Math.round(box.y * H));
    const sw = Math.min(W - sx, Math.round(box.w * W));
    const sh = Math.min(H - sy, Math.round(box.h * H));
    if (sw < 4 || sh < 4) continue;
    const c = document.createElement('canvas');
    c.width = sw; c.height = sh;
    c.getContext('2d').drawImage(img, sx, sy, sw, sh, 0, 0, sw, sh);
    result[name] = c;
  }
  return result;
}

async function loadOnePresetFeatures(src) {
  const img = await loadImg(src);
  const cacheKey = 'cf_boxes_' + src;
  const cached = localStorage.getItem(cacheKey);
  let boxes;
  if (cached) {
    boxes = JSON.parse(cached);
  } else {
    boxes = await extractFaceFeatures(img);
    try { localStorage.setItem(cacheKey, JSON.stringify(boxes)); } catch (_) {}
  }
  return cropFaceFeatures(img, boxes);
}

// ── Three.js init ─────────────────────────────────────────────────────────
function initThree(mount) {
  const W = mount.clientWidth, H = mount.clientHeight;

  scene = new THREE.Scene();
  // No scene.background — canvas is transparent so shader only touches the sphere

  camera = new THREE.PerspectiveCamera(45, W / H, 0.1, 100);
  camera.position.set(0, 0, 3.5);

  renderer = new THREE.WebGLRenderer({ antialias: false, alpha: true, preserveDrawingBuffer: true });
  renderer.setClearColor(0x000000, 0);  // fully transparent clear
  renderer.setPixelRatio(1);
  renderer.setSize(W, H);
  renderer.outputColorSpace = THREE.SRGBColorSpace;
  mount.appendChild(renderer.domElement);

  scene.add(new THREE.AmbientLight(0xffffff, 0.70));

  // Lights are in world space but repositioned every frame from camera orientation,
  // so they always shine from the screen's upper-right-front regardless of object rotation.
  dirLight = new THREE.DirectionalLight(0xffffff, 3.0);
  scene.add(dirLight); scene.add(dirLight.target);

  fillLight = new THREE.DirectionalLight(0xffffff, 0.45);
  scene.add(fillLight); scene.add(fillLight.target);

  controls = new OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true; controls.dampingFactor = 0.06;
  controls.enablePan = true;  controls.minDistance = 1.5; controls.maxDistance = 9;
  controls.mouseButtons = { LEFT: THREE.MOUSE.ROTATE, MIDDLE: THREE.MOUSE.PAN, RIGHT: THREE.MOUSE.PAN };
  controls.autoRotate = true; controls.autoRotateSpeed = 0.6;

  // RGBA render target so transparency is preserved through post-processing
  const rt = new THREE.WebGLRenderTarget(W, H, {
    minFilter: THREE.LinearFilter, magFilter: THREE.LinearFilter,
    format: THREE.RGBAFormat,
  });
  composer = new EffectComposer(renderer, rt);
  composer.addPass(new RenderPass(scene, camera));
  retroPass = new ShaderPass(RetroShader);
  retroPass.uniforms.resolution.value.set(W, H);
  composer.addPass(retroPass);

  window.addEventListener('resize', onResize);
}

function onResize() {
  const mount = document.getElementById('three-mount');
  if (!mount.clientWidth || !renderer) return;
  const W = mount.clientWidth, H = mount.clientHeight;
  camera.aspect = W / H;
  camera.updateProjectionMatrix();
  renderer.setSize(W, H);
  composer.setSize(W, H);
  retroPass.uniforms.resolution.value.set(W, H);
  const sc = document.getElementById('shadow-canvas');
  sc.width = W; sc.height = H;
}

async function buildThreeScene(img, data) {
  const mount = document.getElementById('three-mount');
  mount.style.display = 'block';
  if (!threeInited) { initThree(mount); threeInited = true; }
  // Init shadow canvas (matches viewport size)
  const sc = document.getElementById('shadow-canvas');
  sc.width = mount.clientWidth; sc.height = mount.clientHeight;
  sc.style.display = 'block';
  shadowCtx2D = sc.getContext('2d');
  buildMesh(img, mount, data);
  currentFaceData = data;
  document.getElementById('face-canvas').style.display = 'none';
  document.getElementById('placeholder').style.display = 'none';
  const hint = document.getElementById('hint-3d');
  hint.classList.add('show');
  setTimeout(() => hint.classList.remove('show'), 3500);
  if (rafId) cancelAnimationFrame(rafId);
  startAnimLoop();
}

// ── Catmull-Rom closed spline ─────────────────────────────────────────────
function drawCatmullRom(ctx, pts, W, H) {
  const n = pts.length;
  if (n < 3) return;
  const p = pts.map(([x, y]) => [x * W, y * H]);
  ctx.beginPath(); ctx.moveTo(p[0][0], p[0][1]);
  for (let i = 0; i < n; i++) {
    const p0 = p[(i-1+n)%n], p1 = p[i], p2 = p[(i+1)%n], p3 = p[(i+2)%n];
    const cp1x = p1[0] + (p2[0]-p0[0])/6, cp1y = p1[1] + (p2[1]-p0[1])/6;
    const cp2x = p2[0] - (p3[0]-p1[0])/6, cp2y = p2[1] - (p3[1]-p1[1])/6;
    ctx.bezierCurveTo(cp1x, cp1y, cp2x, cp2y, p2[0], p2[1]);
  }
  ctx.closePath();
}

function floodFillBackground(pixels, W, H, tolerance) {
  const tol2 = tolerance * tolerance;
  const visited = new Uint8Array(W * H);
  const bgMask  = new Uint8Array(W * H);
  const queue   = new Int32Array(W * H);
  let head = 0, tail = 0;
  function enqueue(i) { if (visited[i]) return; visited[i]=1; queue[tail++]=i; }
  for (let x = 0; x < W; x++) { enqueue(x); enqueue((H-1)*W+x); }
  for (let y = 1; y < H-1; y++) { enqueue(y*W); enqueue(y*W+W-1); }
  while (head < tail) {
    const i = queue[head++]; bgMask[i] = 1;
    const x = i%W, y = (i/W)|0, pi = i*4;
    const r = pixels[pi], g = pixels[pi+1], b = pixels[pi+2];
    for (const ni of [x>0?i-1:-1, x<W-1?i+1:-1, y>0?i-W:-1, y<H-1?i+W:-1]) {
      if (ni<0||visited[ni]) continue;
      const npi = ni*4;
      const dr=pixels[npi]-r, dg=pixels[npi+1]-g, db=pixels[npi+2]-b;
      if (dr*dr+dg*dg+db*db<=tol2) enqueue(ni);
    }
  }
  return bgMask;
}

function applyFoodMask(img, polygon) {
  const W = img.naturalWidth||img.width, H = img.naturalHeight||img.height;
  const MAX_DIM = 600;
  const scale = Math.min(1, MAX_DIM/Math.max(W,H));
  const sw = Math.round(W*scale), sh = Math.round(H*scale);
  const samp = document.createElement('canvas');
  samp.width=sw; samp.height=sh;
  const sctx = samp.getContext('2d',{willReadFrequently:true});
  sctx.drawImage(img,0,0,sw,sh);
  const px = sctx.getImageData(0,0,sw,sh).data;
  const bgMask = floodFillBackground(px,sw,sh,22);
  const polyC = document.createElement('canvas');
  polyC.width=sw; polyC.height=sh;
  const pctx = polyC.getContext('2d',{willReadFrequently:true});
  pctx.fillStyle='#000'; pctx.fillRect(0,0,sw,sh);
  if (polygon&&polygon.length>=3) {
    pctx.fillStyle='#fff'; drawCatmullRom(pctx,polygon,sw,sh); pctx.fill();
  } else { pctx.fillStyle='#fff'; pctx.fillRect(0,0,sw,sh); }
  const polyPx = pctx.getImageData(0,0,sw,sh).data;
  const alphaC = document.createElement('canvas');
  alphaC.width=sw; alphaC.height=sh;
  const actx = alphaC.getContext('2d');
  const aData = actx.createImageData(sw,sh);
  for (let i=0;i<sw*sh;i++) {
    const inPoly=polyPx[i*4]>128, isBg=bgMask[i]===1;
    const a=(inPoly&&!isBg)?255:0;
    aData.data[i*4]=255; aData.data[i*4+1]=255; aData.data[i*4+2]=255; aData.data[i*4+3]=a;
  }
  actx.putImageData(aData,0,0);
  const feather = Math.max(4,Math.min(W,H)*0.010);
  const blurC = document.createElement('canvas');
  blurC.width=W; blurC.height=H;
  const bctx = blurC.getContext('2d');
  bctx.filter=`blur(${feather}px)`;
  bctx.drawImage(alphaC,0,0,W,H);
  const out = document.createElement('canvas');
  out.width=W; out.height=H;
  const octx = out.getContext('2d');
  octx.drawImage(img,0,0,W,H);
  octx.globalCompositeOperation='destination-in';
  octx.drawImage(blurC,0,0);
  return out;
}

function buildDispCanvas(img, polygon) {
  const W=img.naturalWidth||img.width, H=img.naturalHeight||img.height;
  const c=document.createElement('canvas'); c.width=W; c.height=H;
  const ctx=c.getContext('2d');
  ctx.fillStyle='#050505'; ctx.fillRect(0,0,W,H);
  if (polygon&&polygon.length>=3) {
    ctx.save(); drawCatmullRom(ctx,polygon,W,H); ctx.clip();
    ctx.drawImage(img,0,0,W,H); ctx.restore();
  } else { ctx.drawImage(img,0,0,W,H); }
  return c;
}

function buildFoodCharacter(foodCutout, features, data) {
  const maxDim=1024;
  const natW=foodCutout.width||foodCutout.naturalWidth;
  const natH=foodCutout.height||foodCutout.naturalHeight;
  const scale=Math.min(1,maxDim/Math.max(natW,natH));
  const W=Math.round(natW*scale), H=Math.round(natH*scale);
  const c=document.createElement('canvas'); c.width=W; c.height=H;
  const ctx=c.getContext('2d');
  ctx.drawImage(foodCutout,0,0,W,H);
  const poly=data?.foodPolygon;
  let bx1=0.15,bx2=0.85,by1=0.15,by2=0.85;
  if (poly&&poly.length>=3) {
    const xs=poly.map(p=>p[0]),ys=poly.map(p=>p[1]);
    bx1=Math.min(...xs); bx2=Math.max(...xs);
    by1=Math.min(...ys); by2=Math.max(...ys);
  }
  const cx=((bx1+bx2)/2)*W, cy=((by1+by2)/2)*H;
  const fw=(bx2-bx1)*W, fh=(by2-by1)*H;
  drawCartoonLimbs(ctx,cx,cy,fw,fh,data);
  if (features&&Object.keys(features).length) pasteFaceFeatures(ctx,features,data,W,H);
  return c;
}

function drawCartoonLimbs(ctx,cx,cy,fw,fh,data) {
  const palettes={
    sugar:{fill:'#f9a87c',stroke:'#b84a1e'},fat:{fill:'#f5d98e',stroke:'#a07010'},
    protein:{fill:'#f28080',stroke:'#9a1818'},fiber:{fill:'#7dce94',stroke:'#256e36'},
  };
  const pal=palettes[data?.dominantMacro]||palettes.sugar;
  const lw=Math.max(2.5,fw*0.022);
  ctx.save();
  ctx.globalCompositeOperation='destination-over';
  ctx.strokeStyle=pal.stroke; ctx.fillStyle=pal.fill;
  ctx.lineWidth=lw; ctx.lineJoin='round'; ctx.lineCap='round';
  const armLen=fw*0.36, handR=fw*0.115, legLen=fh*0.32;
  const footRx=fw*0.145, footRy=fh*0.078, armY=cy-fh*0.05;
  const lax=cx-fw*0.46, lhx=lax-armLen, lhy=armY+fw*0.055;
  ctx.beginPath(); ctx.moveTo(lax,armY);
  ctx.quadraticCurveTo(lax-armLen*0.48,armY+fw*0.04,lhx,lhy); ctx.stroke();
  ctx.beginPath(); ctx.ellipse(lhx-handR*0.22,lhy,handR,handR*0.78,-0.25,0,Math.PI*2); ctx.fill(); ctx.stroke();
  for (let k=-1;k<=1;k++) { ctx.beginPath(); ctx.ellipse(lhx-handR*0.22-handR*0.70,lhy+k*handR*0.36,handR*0.22,handR*0.27,0,0,Math.PI*2); ctx.fill(); ctx.stroke(); }
  const rax=cx+fw*0.46, rhx=rax+armLen, rhy=armY+fw*0.055;
  ctx.beginPath(); ctx.moveTo(rax,armY);
  ctx.quadraticCurveTo(rax+armLen*0.48,armY+fw*0.04,rhx,rhy); ctx.stroke();
  ctx.beginPath(); ctx.ellipse(rhx+handR*0.22,rhy,handR,handR*0.78,0.25,0,Math.PI*2); ctx.fill(); ctx.stroke();
  for (let k=-1;k<=1;k++) { ctx.beginPath(); ctx.ellipse(rhx+handR*0.22+handR*0.70,rhy+k*handR*0.36,handR*0.22,handR*0.27,0,0,Math.PI*2); ctx.fill(); ctx.stroke(); }
  const llx0=cx-fw*0.17, lly0=cy+fh*0.46, llx1=llx0-fw*0.06, lly1=lly0+legLen;
  ctx.beginPath(); ctx.moveTo(llx0,lly0); ctx.quadraticCurveTo(llx0-fw*0.04,lly0+legLen*0.55,llx1,lly1); ctx.stroke();
  ctx.beginPath(); ctx.ellipse(llx1-footRx*0.20,lly1+footRy*0.45,footRx,footRy,-0.14,0,Math.PI*2); ctx.fill(); ctx.stroke();
  const rlx0=cx+fw*0.17, rly0=cy+fh*0.46, rlx1=rlx0+fw*0.06, rly1=rly0+legLen;
  ctx.beginPath(); ctx.moveTo(rlx0,rly0); ctx.quadraticCurveTo(rlx0+fw*0.04,rly0+legLen*0.55,rlx1,rly1); ctx.stroke();
  ctx.beginPath(); ctx.ellipse(rlx1+footRx*0.20,rly1+footRy*0.45,footRx,footRy,0.14,0,Math.PI*2); ctx.fill(); ctx.stroke();
  ctx.restore();
}

function pasteFaceFeatures(ctx,features,data,W,H) {
  const fcx=(data?.faceX??0.5)*W, fcy=(data?.faceY??0.48)*H;
  const faceW=(data?.faceScale??0.46)*Math.min(W,H), faceH=faceW*1.25;
  const layout={
    leftEye:{rx:-0.30,ry:-0.20,tw:0.40}, rightEye:{rx:0.30,ry:-0.20,tw:0.40},
    nose:{rx:0.00,ry:0.06,tw:0.32},       mouth:{rx:0.00,ry:0.30,tw:0.58},
  };
  Object.entries(features).forEach(([name,fc])=>{
    const info=layout[name]; if (!info) return;
    const px=fcx+info.rx*faceW, py=fcy+info.ry*faceH;
    const sf=(info.tw*faceW)/fc.width;
    const fw=fc.width*sf, fh=fc.height*sf;
    const jx=(Math.random()-0.5)*faceW*0.015, jy=(Math.random()-0.5)*faceW*0.015;
    const angle=(Math.random()-0.5)*0.08;
    const pad=12, tw2=Math.ceil(fw)+pad*2, th2=Math.ceil(fh)+pad*2;
    const tmp=document.createElement('canvas'); tmp.width=tw2; tmp.height=th2;
    const tctx=tmp.getContext('2d');
    tctx.filter='contrast(1.35) saturate(1.25)';
    tctx.drawImage(fc,pad,pad,fw,fh); tctx.filter='none';
    const blurR=Math.max(2,Math.round(Math.min(fw,fh)*0.05));
    const maskC=document.createElement('canvas'); maskC.width=tw2; maskC.height=th2;
    const mctx=maskC.getContext('2d'); mctx.filter=`blur(${blurR}px)`;
    mctx.beginPath(); mctx.ellipse(tw2/2,th2/2,fw*0.48,fh*0.48,0,0,Math.PI*2);
    mctx.fillStyle='#000'; mctx.fill();
    tctx.globalCompositeOperation='destination-in'; tctx.drawImage(maskC,0,0);
    ctx.save(); ctx.translate(px+jx,py+jy); ctx.rotate(angle);
    ctx.shadowColor='rgba(0,0,0,0.60)'; ctx.shadowBlur=faceW*0.06;
    ctx.shadowOffsetX=faceW*0.018; ctx.shadowOffsetY=faceW*0.025;
    ctx.drawImage(tmp,-tw2/2,-th2/2); ctx.shadowColor='transparent';
    ctx.globalCompositeOperation='screen'; ctx.globalAlpha=0.18;
    ctx.drawImage(tmp,-tw2/2-faceW*0.01,-th2/2-faceW*0.01);
    ctx.globalAlpha=1; ctx.globalCompositeOperation='source-over'; ctx.restore();
  });
}

// ── Nutrient / shape helpers ──────────────────────────────────────────────
function nlerp(a, b, t) { return a + (b - a) * Math.max(0, Math.min(1, t)); }

// Base geometry driven by food category
function buildBaseGeometry(cat) {
  if (cat === 'vegetable') {
    // Cylinder — organic, slightly tapered, random proportions
    const h = 1.4 + Math.random() * 2.2;          // height 1.4 – 3.6
    const r = 0.60 + Math.random() * 0.50;         // radius 0.6 – 1.1
    return new THREE.CylinderGeometry(r * 0.80, r, h, 10, 8);
  }
  if (cat === 'meat') {
    // Box — one axis stretched to suggest a cut of meat
    const dims = [
      1.3 + Math.random() * 1.6,   // long  1.3 – 2.9
      0.65 + Math.random() * 0.70, // mid   0.65 – 1.35
      0.65 + Math.random() * 0.70, // short 0.65 – 1.35
    ].sort(() => Math.random() - 0.5); // shuffle which axis is long
    return new THREE.BoxGeometry(dims[0], dims[1], dims[2], 6, 6, 6);
  }
  if (cat === 'snack') {
    // Tetrahedron — crystalline / spiky snack
    return new THREE.TetrahedronGeometry(1.7, 2);
  }
  // Default: carb → sphere
  return new THREE.SphereGeometry(1.5, 20, 14);
}

// Grass blades (fiber) — placed on actual surface vertices of the model
function buildGrass(fiberNorm, surfacePts) {
  const count  = Math.round(nlerp(50, 300, fiberNorm));
  const bladeH = nlerp(0.10, 0.55, fiberNorm);
  const bladeW = nlerp(0.025, 0.055, fiberNorm);
  const geo    = new THREE.PlaneGeometry(bladeW, bladeH);
  geo.translate(0, bladeH / 2, 0);
  const mat = new THREE.MeshStandardMaterial({
    color: new THREE.Color(0.28, 0.68, 0.30),
    side: THREE.DoubleSide, roughness: 0.95, flatShading: true,
  });
  const im = new THREE.InstancedMesh(geo, mat, count);
  const d  = new THREE.Object3D();
  const up = new THREE.Vector3(0, 1, 0);
  for (let i = 0; i < count; i++) {
    const sp   = surfacePts[Math.floor(Math.random() * surfacePts.length)];
    const norm = sp.clone().normalize();
    d.position.copy(norm).multiplyScalar(sp.length() + Math.random() * 0.05);
    d.quaternion.setFromUnitVectors(up, norm);
    d.rotateY(Math.random() * Math.PI * 2);
    d.rotateX((Math.random() - 0.5) * 0.45);
    d.updateMatrix();
    im.setMatrixAt(i, d.matrix);
  }
  im.instanceMatrix.needsUpdate = true;
  scene.add(im); extraMeshes.push(im);
}

// Fat blobs — placed on actual surface vertices of the model
function buildFatBlobs(fatNorm, surfacePts) {
  const count = Math.round(nlerp(18, 90, fatNorm));
  const blobR = nlerp(0.07, 0.22, fatNorm);
  const geo   = new THREE.SphereGeometry(blobR, 5, 4);
  const mat   = new THREE.MeshStandardMaterial({
    color: new THREE.Color(0.93, 0.84, 0.50),
    roughness: 0.22, metalness: 0.0, flatShading: true,
  });
  const im = new THREE.InstancedMesh(geo, mat, count);
  const d  = new THREE.Object3D();
  for (let i = 0; i < count; i++) {
    const sp   = surfacePts[Math.floor(Math.random() * surfacePts.length)];
    const norm = sp.clone().normalize();
    d.position.copy(norm).multiplyScalar(sp.length() + blobR * 0.55);
    d.updateMatrix();
    im.setMatrixAt(i, d.matrix);
  }
  im.instanceMatrix.needsUpdate = true;
  scene.add(im); extraMeshes.push(im);
}

// Build a 2-D six-pointed star Shape (outer tips + inner valleys alternating)
function makeStarShape(outerR, innerR) {
  const shape = new THREE.Shape();
  for (let i = 0; i < 12; i++) {
    const angle = (i / 12) * Math.PI * 2 - Math.PI / 2;
    const r = i % 2 === 0 ? outerR : innerR;
    const x = Math.cos(angle) * r, y = Math.sin(angle) * r;
    i === 0 ? shape.moveTo(x, y) : shape.lineTo(x, y);
  }
  shape.closePath();
  return shape;
}

// Vitamin stars: flat red six-pointed stars sitting on the surface
function buildVitaminHexagons(vitaminNorm, surfacePts) {
  const count = Math.round(nlerp(12, 100, vitaminNorm));
  const r     = nlerp(0.06, 0.15, vitaminNorm);
  const shape = makeStarShape(r, r * 0.38);
  const geo   = new THREE.ExtrudeGeometry(shape, { depth: 0.025, bevelEnabled: false });
  geo.rotateX(-Math.PI / 2); // ExtrudeGeometry extrudes along Z; rotate so flat face points +Y
  const mat = new THREE.MeshStandardMaterial({
    color: new THREE.Color(0.88, 0.10, 0.12),
    roughness: 0.50, metalness: 0.12, flatShading: true,
  });
  const im = new THREE.InstancedMesh(geo, mat, count);
  const d  = new THREE.Object3D();
  const up = new THREE.Vector3(0, 1, 0);
  for (let i = 0; i < count; i++) {
    const sp   = surfacePts[Math.floor(Math.random() * surfacePts.length)];
    const norm = sp.clone().normalize();
    d.position.copy(norm).multiplyScalar(sp.length() + 0.015);
    d.quaternion.setFromUnitVectors(up, norm); // flat face points outward along surface normal
    d.rotateY(Math.random() * Math.PI * 2);   // random spin
    d.updateMatrix();
    im.setMatrixAt(i, d.matrix);
  }
  im.instanceMatrix.needsUpdate = true;
  scene.add(im); extraMeshes.push(im);
}

// Build a flat ring (annulus) Shape — an outer circle with a smaller circular hole
function makeRingShape(outerR, innerR) {
  const shape = new THREE.Shape();
  shape.absarc(0, 0, outerR, 0, Math.PI * 2, false);
  const hole = new THREE.Path();
  hole.absarc(0, 0, innerR, 0, Math.PI * 2, true);
  shape.holes.push(hole);
  return shape;
}

// Carb rings: flat hollow rings (donuts) with a little thickness, in varying
// shades of blue, sitting on the surface
function buildCarbRings(carbsNorm, surfacePts) {
  const count  = Math.round(nlerp(8, 70, carbsNorm));
  const outerR = nlerp(0.07, 0.17, carbsNorm);
  const shape  = makeRingShape(outerR, outerR * 0.45);
  const geo    = new THREE.ExtrudeGeometry(shape, { depth: 0.025, bevelEnabled: false });
  geo.rotateX(-Math.PI / 2); // flat face points +Y, like the vitamin stars
  // Dummy per-vertex color (all white) so USE_COLOR is a no-op multiply,
  // letting per-instance colors (instanceColor) shine through unmodified.
  geo.setAttribute('color', new THREE.Float32BufferAttribute(new Float32Array(geo.attributes.position.count * 3).fill(1), 3));
  const mat = new THREE.MeshStandardMaterial({
    color: 0xffffff, vertexColors: true,
    roughness: 0.40, metalness: 0.20, flatShading: true,
  });
  const im  = new THREE.InstancedMesh(geo, mat, count);
  const d   = new THREE.Object3D();
  const up  = new THREE.Vector3(0, 1, 0);
  const col = new THREE.Color();
  for (let i = 0; i < count; i++) {
    const sp   = surfacePts[Math.floor(Math.random() * surfacePts.length)];
    const norm = sp.clone().normalize();
    d.position.copy(norm).multiplyScalar(sp.length() + 0.015);
    d.quaternion.setFromUnitVectors(up, norm); // flat face points outward along surface normal
    d.rotateY(Math.random() * Math.PI * 2);   // random spin
    d.updateMatrix();
    im.setMatrixAt(i, d.matrix);

    // Varying shades of blue — from pale sky-blue to deep navy
    const t = Math.random();
    col.setRGB(nlerp(0.55, 0.05, t), nlerp(0.75, 0.20, t), nlerp(1.00, 0.55, t));
    im.setColorAt(i, col);
  }
  im.instanceMatrix.needsUpdate = true;
  im.instanceColor.needsUpdate  = true;
  scene.add(im); extraMeshes.push(im);
}

// Build one merged double-helix geometry: two intertwined tube strands plus a
// few connecting "rung" cylinders, rooted at y=0 and extending to y=height.
function buildDoubleHelixGeometry(height, radius, turns, tubeR, rungCount) {
  const N = 24;
  const ptsA = [], ptsB = [];
  for (let i = 0; i <= N; i++) {
    const t = i / N;
    const angle = t * turns * Math.PI * 2;
    const y = t * height;
    ptsA.push(new THREE.Vector3(Math.cos(angle) * radius, y, Math.sin(angle) * radius));
    ptsB.push(new THREE.Vector3(Math.cos(angle + Math.PI) * radius, y, Math.sin(angle + Math.PI) * radius));
  }
  const tubeA = new THREE.TubeGeometry(new THREE.CatmullRomCurve3(ptsA), 32, tubeR, 5, false);
  const tubeB = new THREE.TubeGeometry(new THREE.CatmullRomCurve3(ptsB), 32, tubeR, 5, false);

  const rungs = [];
  const up = new THREE.Vector3(0, 1, 0);
  for (let i = 0; i < rungCount; i++) {
    const idx = Math.round((i / (rungCount - 1)) * N);
    const a = ptsA[idx], b = ptsB[idx];
    const dir = new THREE.Vector3().subVectors(b, a);
    const len = dir.length();
    if (len < 1e-5) continue;
    dir.normalize();
    const mid  = new THREE.Vector3().addVectors(a, b).multiplyScalar(0.5);
    const quat = new THREE.Quaternion().setFromUnitVectors(up, dir);
    const rung = new THREE.CylinderGeometry(tubeR * 0.8, tubeR * 0.8, len, 5);
    rung.applyMatrix4(new THREE.Matrix4().compose(mid, quat, new THREE.Vector3(1, 1, 1)));
    rungs.push(rung);
  }
  return mergeGeometries([tubeA, tubeB, ...rungs], false);
}

// Protein helices: small white double-helix structures standing on the surface
function buildProteinHelices(proteinNorm, surfacePts) {
  const count  = Math.round(nlerp(10, 80, proteinNorm));
  const height = nlerp(0.18, 0.45, proteinNorm);
  const geo    = buildDoubleHelixGeometry(height, height * 0.18, 2.5, height * 0.045, 5);
  const mat = new THREE.MeshStandardMaterial({
    color: 0xffffff, roughness: 0.35, metalness: 0.05, flatShading: true,
  });
  const im = new THREE.InstancedMesh(geo, mat, count);
  const d  = new THREE.Object3D();
  const up = new THREE.Vector3(0, 1, 0);
  for (let i = 0; i < count; i++) {
    const sp   = surfacePts[Math.floor(Math.random() * surfacePts.length)];
    const norm = sp.clone().normalize();
    d.position.copy(norm).multiplyScalar(sp.length() + 0.01);
    d.quaternion.setFromUnitVectors(up, norm); // helix axis points outward along surface normal
    d.rotateY(Math.random() * Math.PI * 2);   // random spin
    d.updateMatrix();
    im.setMatrixAt(i, d.matrix);
  }
  im.instanceMatrix.needsUpdate = true;
  scene.add(im); extraMeshes.push(im);
}

// Derive a tangent-space normal map from the uploaded photo's luminance so the
// wrapped model picks up the texture/grain of the actual food surface as bumps,
// instead of looking like a flat photo glued onto the shape.
function buildNormalMapFromImage(img, strength = 2.4) {
  const maxDim = 512;
  const srcW = img.naturalWidth  || img.width  || 1;
  const srcH = img.naturalHeight || img.height || 1;
  const scale = Math.min(1, maxDim / Math.max(srcW, srcH));
  const w = Math.max(1, Math.round(srcW * scale));
  const h = Math.max(1, Math.round(srcH * scale));

  const src  = document.createElement('canvas');
  src.width = w; src.height = h;
  const sctx = src.getContext('2d');
  sctx.drawImage(img, 0, 0, w, h);
  const { data: px } = sctx.getImageData(0, 0, w, h);

  // Grayscale "height" buffer
  const lum = new Float32Array(w * h);
  for (let i = 0; i < w * h; i++) {
    const o = i * 4;
    lum[i] = (0.299 * px[o] + 0.587 * px[o + 1] + 0.114 * px[o + 2]) / 255;
  }
  const at = (x, y) => lum[Math.min(h - 1, Math.max(0, y)) * w + Math.min(w - 1, Math.max(0, x))];

  const out  = document.createElement('canvas');
  out.width = w; out.height = h;
  const octx = out.getContext('2d');
  const dst  = octx.createImageData(w, h);
  for (let y = 0; y < h; y++) {
    for (let x = 0; x < w; x++) {
      // Sobel gradients of the luminance field → surface slope
      const gx = (at(x+1,y-1) + 2*at(x+1,y) + at(x+1,y+1)) - (at(x-1,y-1) + 2*at(x-1,y) + at(x-1,y+1));
      const gy = (at(x-1,y+1) + 2*at(x,y+1) + at(x+1,y+1)) - (at(x-1,y-1) + 2*at(x,y-1) + at(x+1,y-1));
      let nx = -gx * strength, ny = -gy * strength, nz = 1.0;
      const len = Math.sqrt(nx*nx + ny*ny + nz*nz);
      nx /= len; ny /= len; nz /= len;
      const o = (y * w + x) * 4;
      dst.data[o]     = Math.round((nx * 0.5 + 0.5) * 255);
      dst.data[o + 1] = Math.round((ny * 0.5 + 0.5) * 255);
      dst.data[o + 2] = Math.round((nz * 0.5 + 0.5) * 255);
      dst.data[o + 3] = 255;
    }
  }
  octx.putImageData(dst, 0, 0);

  const tex = new THREE.CanvasTexture(out);
  tex.colorSpace = THREE.NoColorSpace;
  tex.needsUpdate = true;
  return tex;
}

function buildMesh(img, mount, data) {
  const panelW=mount.clientWidth, panelH=mount.clientHeight;
  camera.position.set(0,0,4.5); camera.aspect=panelW/panelH;
  camera.updateProjectionMatrix(); controls.target.set(0,0,0); controls.update();

  // Remove previous extra meshes
  extraMeshes.forEach(m => {
    scene.remove(m); m.geometry.dispose();
    Array.isArray(m.material) ? m.material.forEach(mt=>mt.dispose()) : m.material.dispose();
  });
  extraMeshes = [];

  // Normalize key nutrients
  const n         = data?.nutrients || {};
  const sugarNorm   = Math.min(1, (n.sugar    || 0) / 40);
  const fiberNorm   = Math.min(1, (n.fiber    || 0) / 12);
  const fatNorm     = Math.min(1, (n.fat      || 0) / 30);
  const vitaminNorm = Math.min(1, (n.vitaminC || 0) / 90); // 90 mg ≈ 100 % DV
  const carbsNorm   = Math.min(1, (n.carbs    || 0) / 60);
  const proteinNorm = Math.min(1, (n.protein  || 0) / 50); // 50 g ≈ 100 % DV

  const tex=new THREE.Texture(img);
  tex.needsUpdate=true; tex.colorSpace=THREE.SRGBColorSpace;

  const normalTex = buildNormalMapFromImage(img);

  // Base shape from food category; sugar drives spike intensity
  const cat    = data?.foodCategory || 'carb';
  const spikeP = nlerp(0.04, 0.45, sugarNorm);
  const spkMax = nlerp(0.40, 2.20, sugarNorm);
  const BUMP   = 0.22;

  const geo = buildBaseGeometry(cat);
  const pos = geo.attributes.position;
  const dispMap = new Map();
  for (let i = 0; i < pos.count; i++) {
    const x=pos.getX(i), y=pos.getY(i), z=pos.getZ(i);
    const key=`${x.toFixed(4)},${y.toFixed(4)},${z.toFixed(4)}`;
    if (!dispMap.has(key)) {
      const isSpike = Math.random() < spikeP;
      dispMap.set(key, isSpike
        ? (Math.random()*spkMax + 0.3) * (Math.random()<0.5?1:-1)
        : (Math.random()-0.5)*BUMP);
    }
    const disp = dispMap.get(key);
    const r = Math.sqrt(x*x+y*y+z*z);
    if (r < 0.001) continue;
    const s = (r+disp)/r;
    pos.setXYZ(i, x*s, y*s, z*s);
  }
  pos.needsUpdate=true; geo.computeVertexNormals();

  // Collect unique surface points for grass / blob placement
  const surfacePts=[], seen=new Set();
  for (let i=0; i<pos.count; i++) {
    const x=pos.getX(i), y=pos.getY(i), z=pos.getZ(i);
    const key=`${Math.round(x*40)},${Math.round(y*40)},${Math.round(z*40)}`;
    if (!seen.has(key)) { seen.add(key); surfacePts.push(new THREE.Vector3(x,y,z)); }
  }

  const mat=new THREE.MeshStandardMaterial({
    map:tex, normalMap:normalTex, normalScale:new THREE.Vector2(0.85,0.85),
    roughness:0.82, metalness:0.02, flatShading:true,
  });
  if (mesh) {
    scene.remove(mesh); mesh.geometry.dispose();
    mesh.material.map?.dispose(); mesh.material.normalMap?.dispose();
    mesh.material.dispose();
  }
  mesh=new THREE.Mesh(geo,mat); scene.add(mesh);

  if (fiberNorm   > 0.06) buildGrass(fiberNorm, surfacePts);
  if (fatNorm     > 0.06) buildFatBlobs(fatNorm, surfacePts);
  if (vitaminNorm > 0.06) buildVitaminHexagons(vitaminNorm, surfacePts);
  if (carbsNorm   > 0.06) buildCarbRings(carbsNorm, surfacePts);
  if (proteinNorm > 0.06) buildProteinHelices(proteinNorm, surfacePts);
}

// ── Shadow — drawn on a plain 2D canvas, never touched by the shader ──────
function renderShadow2D() {
  if (!shadowCtx2D || !camera) return;
  const W = shadowCtx2D.canvas.width, H = shadowCtx2D.canvas.height;
  shadowCtx2D.clearRect(0, 0, W, H);

  // World-space ground point: below the sphere, offset left/back (opposite main light)
  const gp = new THREE.Vector3(-0.40, -2.60, -0.20).project(camera);
  const sx = (gp.x + 1) / 2 * W;
  const sy = (-gp.y + 1) / 2 * H;
  const rx = W * 0.13;   // semi-major axis
  const ry = rx * 0.28;  // semi-minor axis (foreshortened ellipse)

  shadowCtx2D.save();
  shadowCtx2D.translate(sx, sy);
  shadowCtx2D.scale(1, ry / rx);
  const g = shadowCtx2D.createRadialGradient(0, 0, 0, 0, 0, rx);
  g.addColorStop(0,   'rgba(0,0,0,0.34)');
  g.addColorStop(0.45,'rgba(0,0,0,0.16)');
  g.addColorStop(1,   'rgba(0,0,0,0)');
  shadowCtx2D.beginPath();
  shadowCtx2D.arc(0, 0, rx, 0, Math.PI * 2);
  shadowCtx2D.fillStyle = g;
  shadowCtx2D.fill();
  shadowCtx2D.restore();
}

function startAnimLoop() {
  // Pre-allocated vectors — reused every frame to avoid GC pressure
  const _r = new THREE.Vector3(), _u = new THREE.Vector3(), _b = new THREE.Vector3();
  const _msp = new THREE.Vector3(); // model screen position probe
  const _rp  = new THREE.Vector3(); // radius edge probe for screen-space radius

  function tick() {
    controls.update();

    // Reposition lights every frame so they always come from screen's upper-right-front.
    // Derive camera's right / up / back-toward-viewer axes from its current quaternion.
    if (dirLight && camera) {
      _r.set(1, 0, 0).applyQuaternion(camera.quaternion);   // screen right
      _u.set(0, 1, 0).applyQuaternion(camera.quaternion);   // screen up
      _b.set(0, 0, 1).applyQuaternion(camera.quaternion);   // toward viewer

      dirLight.position
        .copy(camera.position)
        .addScaledVector(_r,  2.0)
        .addScaledVector(_u,  3.0)
        .addScaledVector(_b,  1.5);  // upper-right-front

      fillLight.position
        .copy(camera.position)
        .addScaledVector(_r, -1.5)
        .addScaledVector(_u, -0.8)
        .addScaledVector(_b,  1.5);  // lower-left fill
    }

    renderShadow2D();
    composer.render();

    // ── Adaptive text colour: sample the left-panel background every 10 frames ──
    if (++bgFrameCount % 10 === 0) {
      try {
        // drawImage samples the text area (left:25px, top:80px, 380×380px)
        _bgCtx.clearRect(0, 0, 8, 8);
        _bgCtx.drawImage(renderer.domElement, 25, 80, 380, 380, 0, 0, 8, 8);
        const d = _bgCtx.getImageData(0, 0, 8, 8).data;
        let lum = 0;
        for (let i = 0; i < d.length; i += 4) {
          const a = d[i + 3] / 255;                   // alpha of WebGL pixel
          const r = d[i]     * a + 255 * (1 - a);     // composite onto white background
          const g = d[i + 1] * a + 255 * (1 - a);
          const b = d[i + 2] * a + 255 * (1 - a);
          lum += (0.299 * r + 0.587 * g + 0.114 * b) / 255;
        }
        lum /= d.length / 4;
        textColorTarget = lum < 0.45 ? 1.0 : 0.0;    // dark bg → white text
      } catch (_) { /* cross-origin guard */ }
    }
    textColorCur += (textColorTarget - textColorCur) * 0.02; // ~3 s slide
    {
      const inner = document.getElementById('speech-inner');
      if (inner && inner.children.length > 0) {
        const v  = Math.round(textColorCur * 255);               // body: 17→255
        const lv = Math.round(102 + textColorCur * (255 - 102)); // label: #666→#fff
        inner.style.setProperty('--txt-body',  `rgb(${v},${v},${v})`);
        inner.style.setProperty('--txt-label', `rgb(${lv},${lv},${lv})`);
      }
    }

    // ── Per-item squish & layout collision ───────────────────────────────────
    if (!cardViewActive && mesh && camera && document.getElementById('speech-display')?.style.display !== 'none') {
      _msp.setFromMatrixPosition(mesh.matrixWorld).project(camera);
      const mSX = (_msp.x + 1) * 0.5 * window.innerWidth;
      const mSY = (-_msp.y + 1) * 0.5 * window.innerHeight;
      const W = window.innerWidth, H = window.innerHeight;

      if (textLayout === 'left') {
        // Compute mesh screen-space radius via bounding sphere projection
        if (!mesh.geometry.boundingSphere) mesh.geometry.computeBoundingSphere();
        const bs = mesh.geometry.boundingSphere;
        let screenRadius = 150;
        if (bs) {
          _rp.setFromMatrixPosition(mesh.matrixWorld);
          _rp.x += bs.radius;
          _rp.project(camera);
          screenRadius = Math.abs(_rp.x - _msp.x) * 0.5 * W;
        }

        // Per-character squish: chars the model circle overlaps shrink AND pull
        // toward the left, so each text row visibly compresses away from the
        // model rather than each glyph just shrinking in place (leaving gaps).
        // Accumulate per-row so later characters close the gap left by earlier ones.
        let maxSquish = 0;
        document.querySelectorAll('#speech-inner .speech-item-label, #speech-inner .speech-item-body').forEach(line => {
          let cumShift = 0, rowTop = null;
          line.querySelectorAll('.speech-char').forEach(ch => {
            const r   = ch.getBoundingClientRect();
            const cx  = r.left + r.width  / 2;
            const cy  = r.top  + r.height / 2;
            const dist = Math.sqrt((mSX - cx) ** 2 + (mSY - cy) ** 2);
            const penetration = Math.max(0, screenRadius - dist);
            const targetS = Math.min(1, penetration / 35);
            const prev = parseFloat(ch.dataset.squish || '0');
            // Slow build-up so the compression is clearly visible before the transfer fires
            const next = prev + (targetS - prev) * 0.08;
            ch.dataset.squish = next;

            // Reset accumulated shift at each line wrap (row changes top offset)
            const top = Math.round(r.top);
            if (rowTop !== null && Math.abs(top - rowTop) > 2) cumShift = 0;
            rowTop = top;

            const sqX = next > 0.005 ? (1 - next * 0.65) : 1;
            ch.style.setProperty('--sq-x',  sqX.toFixed(3));
            ch.style.setProperty('--sq-tx', cumShift > 0.4 ? `-${cumShift.toFixed(1)}px` : '0px');
            cumShift += r.width * (1 - sqX);

            if (next > maxSquish) maxSquish = next;
          });
        });

        // Only hand off to the scattered layout once the squeeze is pronounced
        if (maxSquish > 0.7) switchToColumn(mSX, mSY, screenRadius, W);
      } else if (textLayout === 'column') {
        // Return to left when model is clearly right of the text zone
        if (mSX > W * 0.52) switchToLeft();
      }
    }

    rafId = requestAnimationFrame(tick);
  }
  tick();
}

// ── Speech: each item gets its OWN element — fixes concurrent typewriter bug ──
function startSpeech() {
  if (!speechList.length) return;
  document.getElementById('speech-display').style.display = 'block';
  document.getElementById('left-scroll-zone').style.display = 'block';
  nextSpeech();
}

function nextSpeech() {
  const item = speechList[speechIdx];
  const bodyEl = appendSpeechItem(item);

  const plain = item.text.replace(/\*\*([^*]+)\*\*/g, '$1');
  let fired = false;
  const advance = () => {
    if (fired) return;
    fired = true;
    speechIdx++;
    if (speechIdx < speechList.length) speechTimer = setTimeout(nextSpeech, 600);
  };

  speakItem(plain, advance, bodyEl);
  speechTimer = setTimeout(advance, 10000);
}

function speechScrollToBottom() {
  const inner = document.getElementById('speech-inner');
  if (!inner) return;
  const avail = window.innerHeight - (5 * parseFloat(getComputedStyle(document.documentElement).fontSize));
  const maxOff = Math.max(0, inner.offsetHeight - avail);
  speechScrollOff = maxOff;
  applyInnerTransform(inner);
}

// Each call creates its own DOM element — no shared state, no garbled text
function appendSpeechItem(item) {
  const container = document.getElementById('speech-inner');

  // Outer wrap handles the fly-to-top/bottom layout transform
  const outerWrap = document.createElement('div');
  outerWrap.className = 'speech-item-wrap';

  const wrapper = document.createElement('div');
  wrapper.className = 'speech-item';
  wrapper.style.animationDelay = `-${(Math.random() * 4).toFixed(2)}s`;

  const label = document.createElement('div');
  label.className = 'speech-item-label';
  // Split label into per-character floating spans
  const labelText = item.nutrient + (item.amount ? ' — ' + item.amount : '');
  for (const ch of labelText) {
    if (ch === ' ') { label.appendChild(document.createTextNode(' ')); continue; }
    const s = document.createElement('span');
    s.className = 'speech-char';
    s.style.setProperty('--cx', `${((Math.random()-.5)*.8).toFixed(1)}px`);
    s.style.setProperty('--cy', `${(-(Math.random()*1.8+.3)).toFixed(1)}px`);
    s.style.setProperty('--cd', `${(2+Math.random()*2).toFixed(2)}s`);
    s.style.setProperty('--ca', `-${(Math.random()*4).toFixed(2)}s`);
    s.textContent = ch;
    label.appendChild(s);
  }

  const body = document.createElement('div');
  body.className = 'speech-item-body';

  wrapper.appendChild(label);
  wrapper.appendChild(body);
  outerWrap.appendChild(wrapper);
  container.appendChild(outerWrap);
  speechScrollToBottom();

  // Pre-create ALL body spans immediately (opacity:0) so boundary events can
  // find them right away. Typewriter reveals them one-by-one via opacity.
  const tokens = parseBold(item.text || '');
  const revealQueue = [];
  for (const tok of tokens) {
    for (const ch of tok.text) {
      if (ch === ' ') {
        body.appendChild(document.createTextNode(' '));
      } else {
        const s = document.createElement('span');
        s.className = 'speech-char';
        if (tok.bold) s.style.fontWeight = '700';
        s.style.setProperty('--cx', `${((Math.random()-.5)*1.2).toFixed(1)}px`);
        s.style.setProperty('--cy', `${(-(Math.random()*3.5+.5)).toFixed(1)}px`);
        s.style.setProperty('--cd', `${(2+Math.random()*2.5).toFixed(2)}s`);
        s.style.setProperty('--ca', `-${(Math.random()*5).toFixed(2)}s`);
        s.style.opacity = '0';
        s.textContent = ch;
        body.appendChild(s);
        revealQueue.push(s);
      }
    }
  }
  let qi = 0;
  function type() {
    if (qi >= revealQueue.length) { speechScrollToBottom(); return; }
    revealQueue[qi].style.opacity = '1';
    qi++;
    setTimeout(type, 26);
  }
  type();
  return body;
}

// ── Shared transform helper: handles scroll offset on #speech-inner ─────────
function applyInnerTransform(inner) {
  inner.style.transform = speechScrollOff > 0 ? `translateY(-${speechScrollOff}px)` : '';
}

// Reset per-item squish on all wraps
function clearItemSquish() {
  document.querySelectorAll('#speech-inner .speech-item-wrap').forEach(w => {
    w.style.transform = '';
    w.style.transformOrigin = '';
    delete w.dataset.squish;
  });
  document.querySelectorAll('#speech-inner .speech-char').forEach(ch => {
    ch.style.removeProperty('--sq-x');
    ch.style.removeProperty('--sq-tx');
    delete ch.dataset.squish;
  });
}

// ── Text layout: left column ↔ scattered column ───────────────────────────
function findFreePosition(W, H, colW, itemH, mX, mY, mR, placed, rightPanelLeft, barTop) {
  const L = 20, T = 80;
  const B = barTop - 10;
  const R = rightPanelLeft - colW - 10;
  if (R <= L) return { x: L, y: T + placed.length * (itemH + 18) };
  for (let i = 0; i < 60; i++) {
    const x = L + Math.random() * Math.max(0, R - L);
    const y = T + Math.random() * Math.max(0, B - T - itemH);
    const cx = x + colW / 2, cy = y + itemH / 2;
    if (mR > 0 && Math.sqrt((cx - mX) ** 2 + (cy - mY) ** 2) < mR + 70) continue;
    let ok = true;
    for (const p of placed) {
      if (x < p.x + colW + 18 && x + colW + 18 > p.x &&
          y < p.y + itemH + 18 && y + itemH + 18 > p.y) { ok = false; break; }
    }
    if (ok) return { x: Math.round(x), y: Math.round(y) };
  }
  return { x: Math.max(L, Math.min(R, L)), y: Math.min(B - itemH, T + placed.length * (itemH + 18)) };
}

function switchToColumn(modelScreenX, modelScreenY, modelScrRadius, screenW) {
  if (textLayout === 'column') return;
  textLayout = 'column';
  clearItemSquish();

  const wraps = Array.from(document.querySelectorAll('#speech-inner .speech-item-wrap'));
  if (!wraps.length) return;

  const W = screenW || window.innerWidth;
  const H = window.innerHeight;
  const rightPanel    = document.querySelector('.right');
  const rightPanelLeft = rightPanel ? rightPanel.getBoundingClientRect().left : W - 210;
  const retroBar      = document.getElementById('retro-ctrl');
  const barTop        = retroBar ? retroBar.getBoundingClientRect().top : H - 100;

  const colW  = 200;
  const itemH = 30;

  speechScrollOff = 0;
  const inner = document.getElementById('speech-inner');
  inner.style.transition = 'none';
  inner.style.transform  = '';
  document.getElementById('left-scroll-zone').style.display = 'none';

  const placed = [];

  wraps.forEach((wrap, wrapIdx) => {
    const pos = findFreePosition(W, H, colW, itemH, modelScreenX, modelScreenY, modelScrRadius, placed, rightPanelLeft, barTop);
    placed.push(pos);
    const tx = pos.x, ty = pos.y;

    const fontSize = 17 + Math.floor(Math.random() * 5); // 17–21 px

    const chars   = Array.from(wrap.querySelectorAll('.speech-item-label .speech-char'));
    const bodyEl  = wrap.querySelector('.speech-item-body');
    const labelEl = wrap.querySelector('.speech-item-label');
    const labelFullText = labelEl ? labelEl.textContent : '';

    // Snapshot char positions before DOM mutations
    const charRects = chars.map(c => { const r = c.getBoundingClientRect(); return { left: r.left, top: r.top }; });

    // Fade body
    if (bodyEl) { bodyEl.style.transition = 'opacity 0.15s'; bodyEl.style.opacity = '0'; }

    // Pin each label char at its current screen spot, stop float anim
    chars.forEach((ch, ci) => {
      const r = charRects[ci];
      ch.style.animation  = 'none';
      ch.style.position   = 'fixed';
      ch.style.left       = `${r.left}px`;
      ch.style.top        = `${r.top}px`;
      ch.style.zIndex     = '25';
      ch.style.transition = 'none';
    });

    // Hide the wrap (chars are visible, flying independently)
    wrap.classList.add('sp-compact');
    const wrapRect = wrap.getBoundingClientRect();
    Object.assign(wrap.style, {
      position: 'fixed', left: `${wrapRect.left}px`, top: `${wrapRect.top}px`,
      width: `${colW}px`, margin: '0', zIndex: '21',
      opacity: '0', transition: 'none',
    });

    // Letter-by-letter flight to target position
    requestAnimationFrame(() => {
      chars.forEach((ch, ci) => {
        const delay = (wrapIdx * 0.055 + ci * 0.026).toFixed(3);
        const dur   = (0.38 + Math.random() * 0.14).toFixed(2);
        const frac  = chars.length > 1 ? ci / (chars.length - 1) : 0.5;
        const destX = tx + 5 + Math.round(frac * (colW - 14));
        const destY = ty + 6;
        ch.style.transition = `left ${dur}s ${delay}s cubic-bezier(.34,1.56,.64,1), top ${dur}s ${delay}s cubic-bezier(.25,.46,.45,.94)`;
        ch.style.left = `${destX}px`;
        ch.style.top  = `${destY}px`;
      });

      // After last char lands: restore, set font size, typewriter-glitch label
      const snapMs = (wrapIdx * 0.055 + chars.length * 0.026 + 0.52) * 1000;
      setTimeout(() => {
        chars.forEach(ch => {
          Object.assign(ch.style, { animation: '', position: '', left: '', top: '', zIndex: '', transition: '' });
        });
        if (bodyEl) Object.assign(bodyEl.style, { opacity: '', transition: '' });

        // Store original label HTML for restoration when returning to left layout
        if (labelEl && !wrap.dataset.origLabel) wrap.dataset.origLabel = labelEl.innerHTML;

        Object.assign(wrap.style, {
          left: `${tx}px`, top: `${ty}px`, width: `${colW}px`, opacity: '1', transition: 'none',
        });

        // Apply random font size + colorful float animation, then typewriter-glitch
        if (labelEl) {
          labelEl.style.fontSize = `${fontSize}px`;
          labelEl.style.setProperty('--cc-d', `${(4 + Math.random() * 4).toFixed(2)}s`);
          labelEl.style.setProperty('--cc-a', `-${(Math.random() * 8).toFixed(2)}s`);
          labelEl.style.setProperty('--pf-d', `${(2.5 + Math.random() * 2).toFixed(2)}s`);
          labelEl.style.setProperty('--pf-a', `-${(Math.random() * 5).toFixed(2)}s`);
          labelEl.style.setProperty('--pf-h', `-${(3 + Math.random() * 5).toFixed(1)}px`);
          labelEl.style.opacity  = '0';
          const fullText = labelFullText;
          setTimeout(() => {
            labelEl.innerHTML = '';
            labelEl.style.opacity = '1';
            const glitchPool = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!#$%&?@';
            let idx = 0, glitchN = 0;
            function typeGlitch() {
              if (idx >= fullText.length) { labelEl.textContent = fullText; return; }
              const ch = fullText[idx];
              if (ch === ' ' || ch === '—') {
                idx++;
                labelEl.textContent = fullText.slice(0, idx);
                setTimeout(typeGlitch, 38);
              } else if (Math.random() < 0.35 && glitchN < 2) {
                glitchN++;
                labelEl.textContent = fullText.slice(0, idx) + glitchPool[Math.floor(Math.random() * glitchPool.length)];
                setTimeout(typeGlitch, 55);
              } else {
                glitchN = 0;
                idx++;
                labelEl.textContent = fullText.slice(0, idx);
                setTimeout(typeGlitch, 42 + Math.random() * 28);
              }
            }
            typeGlitch();
          }, 80);
        }
      }, snapMs);
    });
  });
}

function parseBold(text) {
  const out = [], re = /\*\*([^*]+)\*\*/g;
  let last = 0, m;
  while ((m = re.exec(text)) !== null) {
    if (m.index > last) out.push({ text: text.slice(last, m.index), bold: false });
    out.push({ text: m[1], bold: true });
    last = m.index + m[0].length;
  }
  if (last < text.length) out.push({ text: text.slice(last), bold: false });
  return out;
}

function speakItem(text, onDone, bodyEl) {
  if (!window.speechSynthesis) { if (onDone) onDone(); return; }
  // Do NOT cancel here — cancel() was firing onerror on the previous utterance
  // prematurely, causing the pipeline to race ahead before speak() was called.
  const u = new SpeechSynthesisUtterance(text);
  u.rate = 0.95; u.lang = 'en-US';
  const voices = window.speechSynthesis.getVoices();
  const voice = voices.find(v => v.lang === 'en-US' && v.localService)
             || voices.find(v => v.lang === 'en-US')
             || voices.find(v => v.lang.startsWith('en'))
             || null;
  if (voice) u.voice = voice;
  talking = true;
  const mi = setInterval(() => { mouthOpen = !mouthOpen; }, 115);
  const resumeFix = setInterval(() => {
    if (window.speechSynthesis.paused) window.speechSynthesis.resume();
  }, 5000);

  const clearReading = () => {
    try {
      if (bodyEl) bodyEl.querySelectorAll('.speech-char.reading').forEach(s => s.classList.remove('reading'));
    } catch (_) {}
  };
  const cleanup = () => {
    clearInterval(mi); clearInterval(resumeFix);
    mouthOpen = false; talking = false;
    clearReading();
  };

  try {
    u.onboundary = (e) => {
      if (e.name !== 'word' || !bodyEl) return;
      clearReading();
      const start = e.charIndex, end = start + (e.charLength || 1);
      let idx = 0;
      bodyEl.childNodes.forEach(node => {
        if (node.nodeType === 3) {
          idx += node.textContent.length;
        } else if (node.classList && node.classList.contains('speech-char')) {
          if (idx >= start && idx < end) node.classList.add('reading');
          idx += node.textContent.length;
        }
      });
    };
  } catch (_) {}

  u.onend = () => { cleanup(); if (onDone) onDone(); };
  u.onerror = (e) => {
    cleanup();
    // 'canceled'/'interrupted' means something external stopped us (Start over, new upload).
    // Do NOT advance — the external caller resets the pipeline itself.
    // Only advance on real errors so the pipeline doesn't stall.
    if (e.error !== 'canceled' && e.error !== 'interrupted') {
      if (onDone) onDone();
    }
  };
  window.speechSynthesis.speak(u);
}

let _spinnerStartTimer = null;

function startLoadingSpinner() {
  const container = document.getElementById('placeholder-text');
  const all = Array.from(container.querySelectorAll('.ph-char, .ph-space'));
  const N = all.length;
  const R = 190; // base circle radius in px

  // ── FLIP step 1: snapshot current positions in the inline horizontal layout ──
  const origCenters = all.map(ch => {
    const r = ch.getBoundingClientRect();
    return { cx: r.left + r.width / 2, cy: r.top + r.height / 2 };
  });

  // ── Pre-compute circle slots (jittered, stable for this session) ──
  const slots = all.map((_, i) => ({
    angle: (i / N) * 360 - 90 + (Math.random() - 0.5) * (360 / N) * 0.5,
    r:     R + (Math.random() - 0.5) * 22,
    tilt:  (Math.random() - 0.5) * 18,
  }));

  // ── FLIP step 2: switch layout (chars jump to container centre) ──
  container.classList.add('ph-spinning');
  // CSS keeps animation-play-state:paused during entry

  // ── FLIP step 3: measure new positions (all at centre now) ──
  const newCenters = all.map(ch => {
    const r = ch.getBoundingClientRect();
    return { cx: r.left + r.width / 2, cy: r.top + r.height / 2 };
  });

  // ── FLIP step 4: instantly cancel the jump — each char appears where it was ──
  all.forEach((ch, i) => {
    const dx = (origCenters[i].cx - newCenters[i].cx).toFixed(1);
    const dy = (origCenters[i].cy - newCenters[i].cy).toFixed(1);
    ch.style.transition = 'none';
    ch.style.transform  = `translate(${dx}px,${dy}px)`;
  });

  // ── FLIP step 5: stagger-release right → left to their circle slots ──
  const STAGGER = 0.55;  // total spread across all chars (s)
  const FLY_DUR = 0.70;  // per-char fly duration (s)

  requestAnimationFrame(() => requestAnimationFrame(() => {
    all.forEach((ch, i) => {
      const { angle, r, tilt } = slots[i];
      const finalT = `rotate(${angle.toFixed(2)}deg) translateY(-${r.toFixed(1)}px) rotate(${tilt.toFixed(1)}deg)`;
      // rightmost char (i = N-1) → delay 0 s; leftmost (i = 0) → delay STAGGER s
      const delay = (STAGGER * (N - 1 - i) / (N - 1)).toFixed(3);
      ch.style.transition = `transform ${FLY_DUR}s cubic-bezier(0.34,1.38,0.64,1) ${delay}s`;
      ch.style.transform  = finalT;
    });

    // Start the ring rotating after the last char lands
    if (_spinnerStartTimer) clearTimeout(_spinnerStartTimer);
    _spinnerStartTimer = setTimeout(() => {
      container.style.animationPlayState = 'running';
      _spinnerStartTimer = null;
    }, (STAGGER + FLY_DUR + 0.12) * 1000);
  }));
}

function stopLoadingSpinner() {
  if (_spinnerStartTimer) { clearTimeout(_spinnerStartTimer); _spinnerStartTimer = null; }
  const container = document.getElementById('placeholder-text');
  if (!container.classList.contains('ph-spinning')) return;
  container.style.animationPlayState = '';
  container.querySelectorAll('.ph-char, .ph-space').forEach(ch => {
    ch.style.transition = '';
    ch.style.transform  = '';
  });
  container.classList.remove('ph-spinning');
}

function cardCalories(n) {
  n = n || {};
  return Math.round((n.protein||0)*4 + (n.carbs||0)*4 + (n.fat||0)*9);
}

function cardTagline(data) {
  const n = data.nutrients || {}, cat = data.foodCategory || '';
  const cal = cardCalories(n);
  const fat    = n.fat    || 0;
  const sugar  = n.sugar  || 0;
  const sodium = n.sodium || 0;
  const protein= n.protein|| 0;
  const fiber  = n.fiber  || 0;
  const vitC   = n.vitaminC || 0;

  // Count red flags
  const highFat    = fat    > 20;
  const veryhighFat= fat    > 30;
  const highSugar  = sugar  > 18;
  const highSodium = sodium > 800;
  const highCal    = cal    > 500;

  // Worst case: multiple red flags
  if (veryhighFat && highSugar)
    return 'Eat sparingly — the heavy fat and sugar combo strains your heart and metabolism over time.';
  if (highFat && highSugar && highCal)
    return "Don't overdo it — piled-up fat, sugar, and calories make this a treat, not a daily go-to.";

  // Single red flags
  if (veryhighFat)
    return 'High in fat — great flavour, but limit portions to keep your cholesterol and arteries happy.';
  if (highFat)
    return 'Tasty, but the fat adds up quickly. Enjoy occasionally and pair with lighter meals.';
  if (highSugar)
    return 'Too much sugar can spike your blood glucose — savour it, but not every day.';
  if (highSodium)
    return 'Watch the salt — frequent intake at this sodium level can raise blood pressure over time.';
  if (highCal && fat > 14)
    return 'Energy-dense with notable fat. A little goes a long way — balance it with movement.';
  if (highCal)
    return 'Calorie-heavy but filling. Great fuel for demanding days, less ideal for a rest day.';

  // Green flags — encourage
  if (cat === 'vegetable' && fiber > 5)
    return 'Eat as much as you like! Packed with fibre and micronutrients — your gut and immune system will thank you.';
  if (cat === 'vegetable' && cal < 80)
    return 'Virtually guilt-free — low calorie, high nutrient. A daily staple that keeps on giving.';
  if (protein > 20 && fat < 12)
    return 'Lean protein hero — eat it often to build muscle, control hunger, and sustain energy.';
  if (protein > 15 && fat < 16)
    return 'Good protein with reasonable fat. A solid choice to keep you full and fuelled.';
  if (fiber > 6)
    return 'Fibre-rich and gut-friendly — a regular helping supports digestion and steady blood sugar.';
  if (vitC > 40)
    return 'Vitamin C powerhouse — eat it regularly to strengthen immunity and skin health.';

  // Neutral / balanced
  if (fat < 10 && sugar < 10 && cal < 350)
    return 'Well-balanced and light. A reliable everyday pick that fits comfortably into any healthy diet.';
  return 'Nutritionally reasonable — enjoy as part of a varied, balanced diet.';
}

function cardHealthRule(data) {
  const n = data.nutrients || {}, cal = cardCalories(n);
  const p = [];
  if (cal < 250) p.push('A light, low-calorie choice that fits any lifestyle.');
  else if (cal < 450) p.push('A balanced energy source for active days.');
  else p.push('A hearty, energy-dense food ideal for demanding days.');
  if (n.protein > 15) p.push(`High protein (${n.protein}g) supports muscle repair.`);
  else if (n.fiber > 4) p.push(`Rich in fiber (${n.fiber}g), promoting gut health.`);
  else if (n.vitaminC > 20) p.push(`Vitamin C (${n.vitaminC}mg) boosts immunity.`);
  else if (n.fat > 18) p.push('Contains notable fat — best enjoyed mindfully.');
  return p.join(' ');
}

  const nutrObj = data.nutrients || {};
  const topNutrients = Object.entries(nutrObj)
    .filter(([k, v]) => v > 0 && NUTRIENT_LABEL[k])
    .sort(([, a], [, b]) => b - a)
    .slice(0, 2);
  topNutrients.forEach(([key, val], i) => {
    const iconKey = key.toLowerCase().replace(/\s+/g,'');
    const icon    = NUTRIENT_ICONS[iconKey] || '◆';
    const label   = NUTRIENT_LABEL[key] || key;
    const unit    = NUTRIENT_UNIT[key] || '';
    const amount  = `${val}${unit.toUpperCase()}`;
    const fact    = NUTRIENT_FACT[key] || `Key nutrient found in this food.`;
    const row = document.createElement('div');
    row.className = 'card-attack';
    row.innerHTML =
      `<div class="card-atk-icons">${icon}${i === 0 ? icon : ''}</div>
       <div class="card-atk-main">
         <div class="card-atk-name cv-selectable" data-pick-prop="color">${label}</div>
         <div class="card-atk-desc">${fact}</div>
       </div>
       <div class="card-atk-dmg cv-selectable" data-pick-prop="color">${amount}</div>`;
    abilEl.appendChild(row);
  });

  // Rule + footer
  document.getElementById('cc-rule').textContent = cardHealthRule(data);
  const ftrEl = document.getElementById('cc-footer');
  ftrEl.innerHTML = '';
  const n = data.nutrients || {};
  const weakNutrient  = n.sugar > 15 ? 'sugar' : n.fat > 20 ? 'fat' : 'sodium';
  const resistNutrient = n.fiber > 3 ? 'fiber' : n.protein > 12 ? 'protein' : 'vit-c';
  const retreatDots   = '●'.repeat(Math.min(3, Math.max(1, Math.round(cardCalories(n) / 200))));
  const ftrItems = [
    { abbr: weakNutrient,  label: 'weakness',   val: '×2'  },
    { abbr: resistNutrient, label: 'resistance', val: '−30' },
    { abbr: retreatDots,   label: 'retreat',     val: ''    },
  ];
  ftrItems.forEach((it, i) => {
    const el = document.createElement('div'); el.className = 'card-ftr-item';
    el.innerHTML = `<span class="fi">${it.abbr}</span>${it.label} ${it.val}`;
    ftrEl.appendChild(el);
    if (i < ftrItems.length - 1) {
      const sep = document.createElement('div'); sep.className = 'card-ftr-sep'; ftrEl.appendChild(sep);
    }
  });
  const copy = document.createElement('div'); copy.className = 'card-ftr-right';
  copy.textContent = '©2025 CrazyFood'; ftrEl.appendChild(copy);

  // Capture the current frame as the grayscale background BEFORE moving the canvas
  if (renderer) {
    const w = renderer.domElement.width, h = renderer.domElement.height;
    const offCanvas = document.createElement('canvas');
    offCanvas.width = w; offCanvas.height = h;
    const ctx = offCanvas.getContext('2d');
    ctx.fillStyle = '#0a0a12';
    ctx.fillRect(0, 0, w, h);
    ctx.drawImage(renderer.domElement, 0, 0);
    const snapUrl = offCanvas.toDataURL('image/jpeg', 0.78);
    document.getElementById('card-view').style.setProperty('--bg-img', `url(${snapUrl})`);
    // Fill transparent card sections with the model snapshot
    const fc = document.getElementById('food-card');
    fc.style.backgroundImage = `url(${snapUrl})`;
    fc.style.backgroundSize  = 'cover';
    fc.style.backgroundPosition = 'center 30%';
  }

  // Move #three-mount inside card model area
  const mount = document.getElementById('three-mount');
  const modelArea = document.getElementById('card-model-area');
  if (mount.parentElement !== modelArea) modelArea.appendChild(mount);
  // Hide shadow canvas (floor shadow looks wrong at card scale)
  document.getElementById('shadow-canvas').style.display = 'none';
  setTimeout(() => onResize(), 16);

  // Slide existing panels out
  document.getElementById('speech-display').classList.add('cv-out');
  document.getElementById('left-scroll-zone').classList.add('cv-out');
  document.querySelector('.right').classList.add('cv-out');

  // Move retro ctrl into overlay (it's position:absolute so it appears bottom-center)
  document.getElementById('card-view').appendChild(document.getElementById('retro-ctrl'));

  // Disable model auto-rotation — in card view model only moves on drag
  if (controls) controls.autoRotate = false;

  // Reset and start the 3D card tilt RAF
  cardEnterT = 0;
  cardTiltTX = 0; cardTiltTY = 0; cardTiltCX = 0; cardTiltCY = 0;
  if (cardRaf) cancelAnimationFrame(cardRaf);

  // Show overlay
  document.getElementById('card-view').classList.add('cv-active');
  document.getElementById('card-btn').classList.remove('cb-show');
  cardViewActive = true;
  cardRaf = requestAnimationFrame(cardTiltLoop);
}

function exitCardView(instant) {
  if (!cardViewActive) return;
  deselectCardEl();
  document.getElementById('card-view').classList.remove('cv-active');
  cardViewActive = false;

  const restore = () => {
    const mount = document.getElementById('three-mount');
    const charPanel = document.querySelector('.char-panel');
    const fc = document.getElementById('face-canvas');
    if (mount.parentElement !== charPanel) charPanel.insertBefore(mount, fc);
    document.getElementById('shadow-canvas').style.display = currentData ? 'block' : 'none';
    onResize();

    // Re-enable model auto-rotation
    if (controls) controls.autoRotate = true;
    // Reset card transform so it's clean next time
    const card = document.getElementById('food-card');
    if (card) card.style.transform = '';

    // Move retro ctrl back to char-panel
    const ctrl = document.getElementById('retro-ctrl');
    if (ctrl.parentElement !== charPanel) charPanel.appendChild(ctrl);

    // Restore panels
    document.getElementById('speech-display').classList.remove('cv-out');
    document.getElementById('left-scroll-zone').classList.remove('cv-out');
    document.querySelector('.right').classList.remove('cv-out');

    document.getElementById('card-view').style.removeProperty('--bg-img');
    const fcExit = document.getElementById('food-card');
    fcExit.style.backgroundImage = '';
    fcExit.style.backgroundSize  = '';
    fcExit.style.backgroundPosition = '';
    fcExit.style.borderColor = '';
    if (currentData) document.getElementById('card-btn').classList.add('cb-show');
  };

  if (instant) restore();
  else setTimeout(restore, 420);
}

document.getElementById('card-btn').addEventListener('click', enterCardView);
document.getElementById('card-back-btn').addEventListener('click', () => {

// ── Card 3D tilt RAF loop ─────────────────────────────────────────────────
function cardTiltLoop() {
  if (!cardViewActive) { cardRaf = null; return; }

  // Lerp tilt toward target (smooth follow)
  cardTiltCX += (cardTiltTX - cardTiltCX) * 0.07;
  cardTiltCY += (cardTiltTY - cardTiltCY) * 0.07;

  // Enter animation: ease-out-cubic over ~28 frames (0.47s @ 60fps)
  cardEnterT = Math.min(1, cardEnterT + 1 / 28);
  const ease  = 1 - Math.pow(1 - cardEnterT, 3);
  const scale = 0.82 + ease * 0.18;   // 0.82 → 1.0
  const ty    = 36 * (1 - ease);       // 36px → 0px

  const card = document.getElementById('food-card');
  if (card) {
    const rx = cardTiltCX.toFixed(2), ry = cardTiltCY.toFixed(2);
    card.style.transform = cardEnterT < 1
      ? `scale(${scale.toFixed(3)}) translateY(${ty.toFixed(1)}px) rotateX(${rx}deg) rotateY(${ry}deg)`
      : `rotateX(${rx}deg) rotateY(${ry}deg)`;

    // Shift holographic shine with tilt
    card.style.setProperty('--sx', (50 + cardTiltCY * 2.2).toFixed(1));
    card.style.setProperty('--sy', (45 - cardTiltCX * 3.0).toFixed(1));
  }

  cardRaf = requestAnimationFrame(cardTiltLoop);
}

// Mouse events driving card tilt
{
  const cv = document.getElementById('card-view');
  const fc = document.getElementById('food-card');
  cv.addEventListener('mousemove', e => {
    if (!cardViewActive) return;
    // When hovering the model area the user rotates the model — don't tilt the card
    if (e.target && e.target.closest && e.target.closest('#card-model-area')) {
      cardTiltTX = 0; cardTiltTY = 0; return;
    }
    const r  = fc.getBoundingClientRect();
    const dx = (e.clientX - r.left  - r.width  / 2) / (r.width  / 2); // -1 → 1
    const dy = (e.clientY - r.top   - r.height / 2) / (r.height / 2); // -1 → 1
    cardTiltTX = -dy * 7;   // ±7° around X (up/down)
    cardTiltTY =  dx * 10;  // ±10° around Y (left/right)
  });
  cv.addEventListener('mouseleave', () => { cardTiltTX = 0; cardTiltTY = 0; });
}

// ── Color picker ─────────────────────────────────────────────────────────
function rgbStrToHex(str) {
  if (!str || str.startsWith('#')) return str || '#08080e';
  const m = str.match(/(\d+)[,\s]+(\d+)[,\s]+(\d+)/);
  return m ? '#' + [m[1],m[2],m[3]].map(n => (+n).toString(16).padStart(2,'0')).join('') : '#08080e';
}

function openModelBgPicker() {
  const input = document.getElementById('cv-bg-input');
  input.value = rgbStrToHex(document.getElementById('card-model-area').style.background);
  input.click();
}

// Live-apply background via the old hidden input (kept for selectCardEl path)
document.getElementById('cv-bg-input').addEventListener('input', e => {
  document.getElementById('card-model-area').style.background = e.target.value;
});

// Live-apply model background from the inline picker
document.getElementById('model-bg-color').addEventListener('input', e => {
  document.getElementById('card-model-area').style.background = e.target.value;
});

function selectCardEl(el) {
  if (selectedCardEl) selectedCardEl.classList.remove('cv-selected');
  cvPickProp = el.dataset.pickProp || 'color';
  // Model background uses its own dedicated picker panel — no crosshair mode
  if (cvPickProp === 'model-bg') {
    selectedCardEl = null; cvPickProp = '';
    openModelBgPicker();
    return;
  }
  selectedCardEl = el;
  cvPickProp = el.dataset.pickProp || 'color';
  el.classList.add('cv-selected');
  document.getElementById('card-view').classList.add('cv-picking');
  if (controls) controls.enabled = false;
}

function deselectCardEl() {
  if (selectedCardEl) selectedCardEl.classList.remove('cv-selected');
  selectedCardEl = null; cvPickProp = '';
  document.getElementById('card-view').classList.remove('cv-picking');
  document.getElementById('cv-cursor').style.display = 'none';
  if (controls && cardViewActive) controls.enabled = true;
}

function sampleModelColor(clientX, clientY) {
  const canvas = renderer && renderer.domElement;
  if (!canvas) return null;
  const rect = canvas.getBoundingClientRect();
  const sx = Math.round((clientX - rect.left) * canvas.width / rect.width);
  const sy = Math.round((clientY - rect.top)  * canvas.height / rect.height);
  if (sx < 0 || sy < 0 || sx >= canvas.width || sy >= canvas.height) return null;
  if (!cvPickCanvas) {
    cvPickCanvas = document.createElement('canvas');
    cvPickCanvas.width = 1; cvPickCanvas.height = 1;
  }
  const ctx = cvPickCanvas.getContext('2d');
  ctx.drawImage(canvas, sx, sy, 1, 1, 0, 0, 1, 1);
  const d = ctx.getImageData(0, 0, 1, 1).data;
  return `rgb(${d[0]},${d[1]},${d[2]})`;
}

function applyCardColor(color) {
  if (!selectedCardEl || !cvPickProp || !color) return;
  if (cvPickProp === 'color') {
    selectedCardEl.style.color = color;
    if (selectedCardEl.id === 'cc-name') selectedCardEl.style.animation = 'none';
  } else if (cvPickProp === 'cal-text') {
    document.getElementById('cc-cal').style.color = color;
    document.querySelector('.card-cal-label').style.color = color;
  } else if (cvPickProp === 'cal-stroke') {
    document.querySelector('.cal-ring').style.borderColor = color;
  } else if (cvPickProp === 'border-color') {
    document.getElementById('food-card').style.borderColor = color;
  } else {
    selectedCardEl.style.background = color;
  }
  deselectCardEl();
}

// Click on food-card: select element or deselect
document.getElementById('food-card').addEventListener('click', e => {
  if (!cardViewActive) return;
  const target = e.target.closest('.cv-selectable');
  // food-card itself (border-color) only selects when the click landed directly on it
  // (i.e. on the border pixels), not when bubbled up from an inner child
  if (target === document.getElementById('food-card') && e.target !== document.getElementById('food-card')) {
    if (selectedCardEl) deselectCardEl();
    return;
  }
  if (target) { e.stopPropagation(); selectCardEl(target); return; }
  if (selectedCardEl) deselectCardEl();
});

// Model area: colour-picker cursor (for element-colour sampling) + bg picker
{
  const modelArea   = document.getElementById('card-model-area');
  const cursor      = document.getElementById('cv-cursor');
  const bgInput     = document.getElementById('model-bg-color');

  // Returns true if the WebGL pixel at (clientX, clientY) belongs to 3D geometry
  // (alpha > threshold), false if it is the transparent background.
  function isOverModel(clientX, clientY) {
    if (!renderer) return false;
    const canvas = renderer.domElement;
    const rect   = canvas.getBoundingClientRect();
    if (clientX < rect.left || clientX > rect.right ||
        clientY < rect.top  || clientY > rect.bottom) return false;
    const px = Math.round((clientX - rect.left) * canvas.width  / rect.width);
    const py = Math.round((clientY - rect.top)  * canvas.height / rect.height);
    const gl = renderer.getContext();
    const buf = new Uint8Array(4);
    gl.readPixels(px, canvas.height - py, 1, 1, gl.RGBA, gl.UNSIGNED_BYTE, buf);
    return buf[3] > 20;   // alpha threshold: >20/255 = model geometry
  }

  // Capture-phase pointerdown: intercept BEFORE OrbitControls receives the event.
  // If click is on the transparent background → open bg colour picker and block OrbitControls.
  // If click is on the 3D model → let it pass through so OrbitControls can rotate/zoom.
  modelArea.addEventListener('pointerdown', e => {
    if (!cardViewActive || e.button !== 0) return;
    if (selectedCardEl) return;   // colour-sampling mode — clicks go to the click handler below

    if (!isOverModel(e.clientX, e.clientY)) {
      // Background click: stop event before canvas / OrbitControls receive it
      e.stopPropagation();
      e.preventDefault();
      bgInput.value = rgbStrToHex(
        document.getElementById('card-model-area').style.background
      ) || '#08080e';
      try { bgInput.showPicker(); } catch (_) { bgInput.click(); }
    }
    // Model click: fall through — OrbitControls handles rotate/zoom normally
  }, true); // ← capture phase so we intercept before canvas target phase

  // Cursor overlay and colour sampling (when another card element is selected)
  modelArea.addEventListener('mousemove', e => {
    if (!selectedCardEl || !cardViewActive) return;
    cursor.style.display = 'block';
    cursor.style.left = e.clientX + 'px';
    cursor.style.top  = e.clientY + 'px';
    const c = sampleModelColor(e.clientX, e.clientY);
    if (c) cursor.style.background = c;
  });

  modelArea.addEventListener('mouseleave', () => { cursor.style.display = 'none'; });

  modelArea.addEventListener('click', e => {
    if (!cardViewActive || !selectedCardEl) return;
    e.stopPropagation();
    applyCardColor(sampleModelColor(e.clientX, e.clientY));
  });
}

// Click on card-view background (outside card) deselects

  if (!e.target.closest('#food-card')) deselectCardEl();

// ── Font-size wheel adjustment (text elements only) ───────────────────────
function cvFontLimits(el) {
  if (el.id === 'cc-name')                         return { min: 12, max: 36 };
  if (el.id === 'cc-cal')                           return { min: 12, max: 32 };
  if (el.id === 'cc-badge')                         return { min: 10, max: 24 };
  if (el.classList.contains('card-cal-label'))      return { min:  7, max: 18 };
  if (el.classList.contains('card-atk-name'))       return { min:  8, max: 20 };
  if (el.classList.contains('card-atk-dmg'))        return { min: 10, max: 28 };
  return { min: 7, max: 30 };
}

document.getElementById('card-view').addEventListener('wheel', e => {
  if (!cardViewActive || !selectedCardEl) return;
  // Only resize text-color targets
  if (cvPickProp !== 'color' && cvPickProp !== 'cal-text') return;
  e.preventDefault();
  const lim = cvFontLimits(selectedCardEl);
  const cur = parseFloat(window.getComputedStyle(selectedCardEl).fontSize);
  const next = Math.min(lim.max, Math.max(lim.min, cur + (e.deltaY < 0 ? 1 : -1)));
  selectedCardEl.style.fontSize = next + 'px';
}, { passive: false });

// ── Card Library ─────────────────────────────────────────────────────────────
