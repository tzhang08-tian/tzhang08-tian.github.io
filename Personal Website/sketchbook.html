<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sketchbook — Tianyu Zhang</title>
  <style>
    body {
      font-family: monospace;
      color: #111;
      margin: 0;
      padding: 4rem 1.5rem 2rem 5rem;
    }
    a { color: #111; }
    .back {
      position: fixed;
      top: 1.5rem;
      left: 5rem;
      font-size: 0.8rem;
      color: #555;
      text-decoration: none;
    }
    .back:hover { color: #111; }
    h1 { font-family: 'Blue Screen Personal Use', 'Sabon Next', 'Sabon', serif; font-size: 2rem; margin: 0 0 1.5rem; }
    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1rem;
      max-width: 1100px;
    }
    .gallery figure {
      margin: 0;
      cursor: pointer;
    }
    .gallery img,
    .gallery video {
      width: 100%;
      display: block;
    }
    .gallery figcaption {
      margin-top: 0.4rem;
      font-size: 0.75rem;
      color: #555;
    }
    .empty {
      color: #555;
      font-size: 0.8rem;
    }
    #lightbox {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(255,255,255,0.95);
      align-items: center;
      justify-content: center;
      cursor: zoom-out;
      z-index: 10;
    }
    #lightbox img,
    #lightbox video {
      max-width: 90vw;
      max-height: 90vh;
    }
  </style>
</head>
<body>
  <a class="back" href="index.html">← back</a>
  <h1>Sketchbook</h1>
  <div class="gallery" id="gallery"></div>
  <div id="lightbox">
    <img id="lightbox-img" alt="">
    <video id="lightbox-video" autoplay loop muted playsinline></video>
  </div>

  <script>
    // add entries here as sketches become available, e.g.
    // { src: 'sketch_photo/page1.jpg', caption: 'date or note' }
    // add type: 'video' for video files
    const sketches = [
      { src: 'sketch_photo/1.mp4', type: 'video' }
    ];

    const gallery = document.getElementById('gallery');
    if (sketches.length === 0) {
      gallery.innerHTML = '<p class="empty">more sketches coming soon</p>';
    } else {
      sketches.forEach(s => {
        const figure = document.createElement('figure');
        let media;
        if (s.type === 'video') {
          media = document.createElement('video');
          media.src = s.src;
          media.autoplay = true;
          media.loop = true;
          media.muted = true;
          media.playsInline = true;
        } else {
          media = document.createElement('img');
          media.src = s.src;
          media.alt = s.caption || '';
        }
        figure.appendChild(media);
        if (s.caption) {
          const caption = document.createElement('figcaption');
          caption.textContent = s.caption;
          figure.appendChild(caption);
        }
        figure.addEventListener('click', () => {
          if (s.type === 'video') {
            lightboxVideo.src = s.src;
            lightboxVideo.style.display = 'block';
            lightboxImg.style.display = 'none';
          } else {
            lightboxImg.src = s.src;
            lightboxImg.style.display = 'block';
            lightboxVideo.style.display = 'none';
          }
          lightbox.style.display = 'flex';
        });
        gallery.appendChild(figure);
      });
    }

    const lightbox = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightbox-img');
    const lightboxVideo = document.getElementById('lightbox-video');
    lightbox.addEventListener('click', () => {
      lightbox.style.display = 'none';
      lightboxVideo.pause();
    });
  </script>
  <script src="cursor-trail.js"></script>
</body>
</html>
